<header class="header">

function wmoInfo(code, isDay=1) {
  const d = isDay ? 'day' : 'night';
  const map = {
    0:{desc:'Clear Sky',wiClass:d==='day'?'wi-day-sunny':'wi-night-clear'},
    1:{desc:'Mainly Clear',wiClass:d==='day'?'wi-day-sunny-overcast':'wi-night-alt-partly-cloudy'},
    2:{desc:'Partly Cloudy',wiClass:d==='day'?'wi-day-cloudy':'wi-night-alt-cloudy'},
    3:{desc:'Overcast',wiClass:'wi-cloud'},45:{desc:'Foggy',wiClass:'wi-fog'},48:{desc:'Icy Fog',wiClass:'wi-fog'},
    51:{desc:'Light Drizzle',wiClass:'wi-sprinkle'},53:{desc:'Drizzle',wiClass:'wi-showers'},55:{desc:'Heavy Drizzle',wiClass:'wi-rain'},
    56:{desc:'Freezing Drizzle',wiClass:'wi-rain-mix'},57:{desc:'Heavy Freezing Drizzle',wiClass:'wi-rain-mix'},
    61:{desc:'Light Rain',wiClass:d==='day'?'wi-day-rain':'wi-night-alt-rain'},63:{desc:'Moderate Rain',wiClass:'wi-rain'},65:{desc:'Heavy Rain',wiClass:'wi-rain'},
    66:{desc:'Freezing Rain',wiClass:'wi-rain-mix'},67:{desc:'Heavy Freezing Rain',wiClass:'wi-rain-mix'},
    71:{desc:'Light Snow',wiClass:d==='day'?'wi-day-snow':'wi-night-alt-snow'},73:{desc:'Moderate Snow',wiClass:'wi-snow'},75:{desc:'Heavy Snow',wiClass:'wi-snow-wind'},
    77:{desc:'Snow Grains',wiClass:'wi-snowflake-cold'},80:{desc:'Light Showers',wiClass:d==='day'?'wi-day-showers':'wi-night-alt-showers'},
    81:{desc:'Moderate Showers',wiClass:'wi-showers'},82:{desc:'Violent Showers',wiClass:'wi-storm-showers'},
    85:{desc:'Snow Showers',wiClass:'wi-snow'},86:{desc:'Heavy Snow Showers',wiClass:'wi-snow-wind'},
    95:{desc:'Thunderstorm',wiClass:d==='day'?'wi-day-thunderstorm':'wi-night-alt-thunderstorm'},
    96:{desc:'Thunderstorm w/ Hail',wiClass:'wi-thunderstorm'},99:{desc:'Severe Thunderstorm',wiClass:'wi-thunderstorm'},
  };
  return map[code]||{desc:'Unknown',wiClass:'wi-na'};
}
function wiIcon(c){return '<i class="wi '+c+'"></i>';}

const RT={prairies:1.0,ontario:0.55,quebec:0.35,maritimes:0.18,west_coast:0.04,interior_bc:0.12};
const RS={prairies:1.0,ontario:0.85,quebec:0.75,maritimes:0.6,west_coast:0.35,interior_bc:0.5};
function sf(m){return [0.08,0.08,0.15,0.35,0.65,1.0,1.0,0.85,0.5,0.25,0.1,0.08][Math.max(0,Math.min(11,m-1))];}
function tornadoRisk(cape,li,gust,region,month){
  cape=cape||0;li=(li===null||li===undefined)?2:li;
  let b=0;
  if(cape>2500&&li<-6)b=55;else if(cape>2000&&li<-5)b=38;else if(cape>1500&&li<-4)b=24;
  else if(cape>1000&&li<-3)b=15;else if(cape>700&&li<-2)b=9;else if(cape>400&&li<-1)b=5;
  else if(cape>200&&li<0)b=2.5;else if(cape>50)b=0.8;
  if(gust>80)b*=1.3;else if(gust>60)b*=1.15;
  return Math.max(0,Math.min(Math.round(b*sf(month)*(RT[region]||0.3)),85));
}
function thunderRisk(cape,li,pp,wc,gust,region,month){
  cape=cape||0;li=(li===null||li===undefined)?2:li;pp=pp||0;
  let b=0;
  if([95,96,99].includes(wc))b=Math.max(b,55+Math.min(pp*0.25,25));
  if(cape>2000&&li<-5)b=Math.max(b,60);else if(cape>1500&&li<-4)b=Math.max(b,48);
  else if(cape>1000&&li<-3)b=Math.max(b,36);else if(cape>700&&li<-2)b=Math.max(b,26);
  else if(cape>400&&li<-1)b=Math.max(b,18);else if(cape>200&&li<0)b=Math.max(b,10);else if(cape>50)b=Math.max(b,4);
  b+=pp*0.18;if(gust>80)b*=1.2;
  return Math.max(0,Math.min(Math.round(b*sf(month)*(RS[region]||0.6)),90));
}
function tLbl(p){if(p===0)return{label:'None',cls:'none'};if(p<=2)return{label:'Slight',cls:'slight'};if(p<=10)return{label:'Low',cls:'low'};if(p<=25)return{label:'Marginal',cls:'marginal'};if(p<=49)return{label:'Moderate',cls:'moderate'};if(p<=75)return{label:'High',cls:'high'};return{label:'Extreme',cls:'extreme'};}
function sLbl(p){if(p===0)return{label:'None',cls:'none'};if(p<=5)return{label:'Slight',cls:'slight'};if(p<=15)return{label:'Low',cls:'low'};if(p<=25)return{label:'Marginal',cls:'marginal'};if(p<=49)return{label:'Moderate',cls:'moderate'};if(p<=75)return{label:'High',cls:'high'};return{label:'Very High',cls:'very-high'};}
function rbc(cls){return{none:'#2ecc71',slight:'#27ae60',low:'#a3d977',marginal:'#f1c40f',moderate:'#e67e22',high:'#e74c3c',extreme:'#c0392b','very-high':'#ff6b35'}[cls]||'#3ab4ff';}
function windDir(deg){if(deg===null||deg===undefined)return'N/A';return['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg/22.5)%16];}

async function fetchCityWeather(city) {
  const url = 'https://api.open-meteo.com/v1/forecast?latitude='+city.lat+'&longitude='+city.lon
    +'&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,surface_pressure,is_day'
    +'&hourly=cape,lifted_index,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max'
    +'&timezone='+encodeURIComponent(city.tz)+'&forecast_days=5&wind_speed_unit=kmh&temperature_unit=celsius&precipitation_unit=mm';
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  const now = new Date(data.current.time);
  const hi = Math.max(0,data.hourly.time.findIndex(t=>new Date(t)>=now));
  const dailyCape=[],dailyLi=[];
  for(let d=0;d<5;d++){
    const s=d*24,e=s+24;
    const ca=data.hourly.cape.slice(s,e).filter(v=>v!==null);
    const li=data.hourly.lifted_index.slice(s,e).filter(v=>v!==null);
    dailyCape.push(ca.length?Math.max(...ca):0);
    dailyLi.push(li.length?Math.min(...li):2);
  }
  const cur=data.current,gust=cur.wind_gusts_10m||cur.wind_speed_10m;
  return {
    city,month:now.getMonth()+1,
    current:{
      temp:Math.round(cur.temperature_2m),feels:Math.round(cur.apparent_temperature),
      humidity:cur.relative_humidity_2m,wCode:cur.weather_code,
      wind:Math.round(cur.wind_speed_10m),windDir:cur.wind_direction_10m,
      windGust:Math.round(gust),precip:cur.precipitation,pressure:Math.round(cur.surface_pressure),
      isDay:cur.is_day,time:cur.time,
      cape:Math.round(data.hourly.cape[hi]??0),
      li:data.hourly.lifted_index[hi]!==null?Math.round((data.hourly.lifted_index[hi]??2)*10)/10:null,
      precipProb:data.hourly.precipitation_probability[hi]??0,
    },
    daily:data.daily,dailyCape,dailyLi,
  };
}

function buildRiskPanel(type,risk,lbl){
  const isTornado=type==='tornado';
  const title=isTornado?'🌪️ Tornado Risk':'⛈️ Thunderstorm Risk';
  const maxR=isTornado?85:90;
  const pct=Math.min((risk/maxR)*100,100);
  const color=rbc(lbl.cls);
  const items=isTornado
    ?[{r:'0-2%',l:'Slight',c:'slight'},{r:'3-10%',l:'Low',c:'low'},{r:'11-25%',l:'Marginal',c:'marginal'},{r:'26-49%',l:'Moderate',c:'moderate'},{r:'51-75%',l:'High',c:'high'},{r:'76-85%',l:'Extreme',c:'extreme'}]
    :[{r:'0-5%',l:'Slight',c:'slight'},{r:'6-15%',l:'Low',c:'low'},{r:'16-25%',l:'Marginal',c:'marginal'},{r:'26-49%',l:'Moderate',c:'moderate'},{r:'51-75%',l:'High',c:'high'},{r:'76-90%',l:'Very High',c:'very-high'}];
  return '<div class="risk-panel"><div class="risk-panel-title">'+title+'</div>'
    +'<div class="risk-value risk-color-'+lbl.cls+'">'+risk+'%</div>'
    +'<div class="risk-label risk-color-'+lbl.cls+'">'+lbl.label+' Risk</div>'
    +'<div class="risk-bar-wrap"><div class="risk-bar" style="width:'+pct+'%;background:'+color+'"></div></div>'
    +'<div class="risk-scale">'+items.map(s=>'<span class="risk-scale-item bg-'+s.c+'" title="'+s.r+'">'+s.l+'</span>').join('')+'</div></div>';
}

function buildLegend(type){
  const isTornado=type==='tornado';
  const title=isTornado?'🌪️ Tornado Risk Scale':'⛈️ Thunderstorm Risk Scale';
  const items=isTornado
    ?[{l:'Slight',c:'slight',n:'Isolated, non-threatening'},{l:'Low',c:'low',n:'Possible in unstable areas'},{l:'Marginal',c:'marginal',n:'Elevated, monitor conditions'},{l:'Moderate',c:'moderate',n:'Significant threat, prepare'},{l:'High',c:'high',n:'Dangerous conditions likely'},{l:'Extreme',c:'extreme',n:'Life-threatening situation'}]
    :[{l:'Slight',c:'slight',n:'Isolated chance'},{l:'Low',c:'low',n:'Scattered storms possible'},{l:'Marginal',c:'marginal',n:'Storms likely in region'},{l:'Moderate',c:'moderate',n:'Widespread storm activity'},{l:'High',c:'high',n:'Severe storms expected'},{l:'Very High',c:'very-high',n:'Dangerous, widespread severe'}];
  return '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem">'
    +'<div class="section-title">'+title+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:5px">'
    +items.map(i=>'<div style="display:flex;align-items:center;gap:8px;font-size:0.7rem"><strong class="risk-color-'+i.c+'" style="min-width:80px">'+i.l+'</strong><span style="color:var(--text-muted)">'+i.n+'</span></div>').join('')
    +'</div></div>';
}

function buildForecast(d,city,month){
  const daily=d.daily;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return daily.time.slice(0,5).map((dateStr,i)=>{
    const date=new Date(dateStr+'T12:00:00');
    const dayLabel=i===0?'Today':days[date.getDay()];
    const wc=daily.weather_code[i];
    const w=wmoInfo(wc,1);
    const hi=Math.round(daily.temperature_2m_max[i]);
    const lo=Math.round(daily.temperature_2m_min[i]);
    const precip=(daily.precipitation_sum[i]||0).toFixed(1);
    const pp=daily.precipitation_probability_max[i]||0;
    const gust=Math.round(daily.wind_gusts_10m_max[i]||daily.wind_speed_10m_max[i]||0);
    const tr=tornadoRisk(d.dailyCape[i]||0,d.dailyLi[i]??2,gust,city.region,date.getMonth()+1);
    const sr=thunderRisk(d.dailyCape[i]||0,d.dailyLi[i]??2,pp,wc,gust,city.region,date.getMonth()+1);
    const tl=tLbl(tr),sl=sLbl(sr);
    return '<div class="forecast-card">'
      +'<div class="forecast-day">'+dayLabel+'</div>'
      +'<div style="font-size:0.65rem;color:var(--text-muted);margin-bottom:4px">'+dateStr.slice(5).replace('-','/')+'</div>'
      +'<div class="forecast-icon">'+wiIcon(w.wiClass)+'</div>'
      +'<div class="forecast-temps"><span class="forecast-hi">'+hi+'°</span><span style="color:var(--text-muted)"> / </span><span class="forecast-lo">'+lo+'°</span></div>'
      +'<div class="forecast-precip">💧 '+precip+'mm · '+pp+'%</div>'
      +'<div class="forecast-risks">'
      +'<div class="forecast-risk-row"><span class="label">🌪</span><span class="risk-chip bg-'+tl.cls+'">'+tr+'% '+tl.label+'</span></div>'
      +'<div class="forecast-risk-row"><span class="label">⛈</span><span class="risk-chip bg-'+sl.cls+'">'+sr+'% '+sl.label+'</span></div>'
      +'</div></div>';
  }).join('');
}

const REFRESH_MS=15*60*1000;
let nextRefreshAt=null,countdownTimer=null;
function updateCountdown(){
  if(!nextRefreshAt)return;
  const ms=nextRefreshAt-Date.now();
  if(ms<=0){document.getElementById('countdownText').textContent='';return;}
  const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);
  document.getElementById('countdownText').textContent='Next update in '+m+':'+String(s).padStart(2,'0');
}
async function loadAllCities(){
  const badge=document.getElementById('updateBadge'),btn=document.getElementById('refreshBtn');
  badge.classList.add('updating');btn.disabled=true;btn.classList.add('loading');
  document.getElementById('lastUpdate').textContent='Updating…';
  clearInterval(countdownTimer);
  const batch=5;
  for(let i=0;i<CITIES.length;i+=batch){
    await Promise.all(CITIES.slice(i,i+batch).map(async city=>{
      try{
        const data=await fetchCityWeather(city);
        state.cityData[city.id]=data;
        renderSidebar();
        if(state.selectedCity===city.id)renderMain();
      }catch(err){console.warn('Failed:',city.name,err);}
    }));
  }
  const now=new Date();
  document.getElementById('lastUpdate').textContent='Updated '+now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  badge.classList.remove('updating');btn.disabled=false;btn.classList.remove('loading');
  nextRefreshAt=Date.now()+REFRESH_MS;
  countdownTimer=setInterval(updateCountdown,1000);
  updateCountdown();
}
async function manualRefresh(){
  clearInterval(state.refreshTimer);clearInterval(countdownTimer);
  await loadAllCities();
  state.refreshTimer=setInterval(loadAllCities,REFRESH_MS);
}
async function init(){
  state.selectedCity='calgary';
  renderSidebar();renderMain();
  await loadAllCities();
  renderMain();
  state.refreshTimer=setInterval(loadAllCities,REFRESH_MS);
}
init();
</script>
</body>
</html>
