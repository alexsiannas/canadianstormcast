<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canadian StormCast ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
<style>
  :root {
    --bg-deep:#162d52; --bg-card:rgba(28,58,108,0.85); --border:rgba(80,150,255,0.22);
    --border-glow:rgba(80,190,255,0.5); --text-primary:#ddeeff; --text-secondary:#8ab8d8;
    --text-muted:#5a88b0; --accent-blue:#4dc4ff; --accent-yellow:#ffe066; --accent-red:#ff5f5f;
    --risk-none:#2ecc71; --risk-slight:#27ae60; --risk-low:#a3d977; --risk-marginal:#f1c40f;
    --risk-moderate:#e67e22; --risk-high:#e74c3c; --risk-extreme:#c0392b; --radius:14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:15px;}
  body{font-family:'Inter',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden;
    background-image:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(30,80,180,0.45) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(20,60,140,0.4) 0%,transparent 70%);}

  /* ── HEADER ── */
  .header{position:sticky;top:0;z-index:100;background:rgba(18,40,82,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 0.75rem;height:64px;display:flex;align-items:center;gap:0.5rem;overflow:visible;}
  @media(max-width:768px){.header{gap:0.35rem;padding:0 0.5rem;}}
  .logo{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:var(--accent-blue);text-shadow:0 0 20px rgba(58,180,255,0.6);white-space:nowrap;letter-spacing:0.05em;flex-shrink:0;}
  .logo span{color:var(--accent-yellow);}

  /* pinned pills */
  .pin-pills{display:flex;align-items:center;gap:0.4rem;flex-shrink:1;overflow-x:auto;scrollbar-width:none;min-width:0;}
  .pin-pills::-webkit-scrollbar{display:none;}
  .pin-pill{display:flex;align-items:center;gap:0.3rem;background:rgba(20,40,80,0.65);border:1px solid rgba(255,224,102,0.3);border-radius:20px;padding:0.22rem 0.55rem 0.22rem 0.4rem;cursor:pointer;transition:all 0.18s;white-space:nowrap;font-size:0.68rem;}
  @media(max-width:768px){.pin-pill .pp-temp{display:none;}.logo{font-size:0.9rem !important;}}
  .pin-pill:hover{border-color:var(--accent-yellow);background:rgba(255,224,102,0.1);}
  .pin-pill.active{border-color:var(--accent-yellow);background:rgba(255,224,102,0.15);box-shadow:0 0 8px rgba(255,224,102,0.25);}
  .pin-pill .pp-icon .wi{font-size:0.9rem;color:#fff;filter:drop-shadow(0 0 3px rgba(255,255,255,0.4));}
  .pin-pill .pp-name{font-weight:600;color:var(--text-primary);}
  .pin-pill .pp-temp{font-family:'Roboto',sans-serif;font-weight:700;color:var(--accent-yellow);font-size:0.78rem;}
  .pin-pill .pp-sep{color:var(--text-muted);}
  .no-pins-hint{font-size:0.65rem;color:var(--text-muted);font-style:italic;white-space:nowrap;}

  /* all-cities dropdown */
  .header-divider{width:1px;height:28px;background:var(--border);flex-shrink:0;margin:0 0.1rem;}
  .cities-dropdown-wrap{position:relative;flex-shrink:0;}
  .cities-btn{display:flex;align-items:center;gap:0.4rem;background:rgba(20,40,80,0.6);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.75rem;font-size:0.75rem;font-family:'Inter',sans-serif;color:var(--text-secondary);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .cities-btn:hover{border-color:var(--border-glow);color:var(--text-primary);background:rgba(30,60,120,0.5);}
  .cities-btn.open{border-color:var(--accent-blue);color:var(--text-primary);}
  .cities-btn .caret{font-size:0.6rem;transition:transform 0.2s;}
  .cities-btn.open .caret{transform:rotate(180deg);}
  .cities-menu{position:absolute;top:calc(100%+6px);left:0;width:260px;background:rgba(20,46,92,0.99);border:1px solid var(--border);border-radius:10px;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,0.7);display:none;max-height:60vh;overflow-y:auto;}
  @media(max-width:600px){.cities-menu{position:fixed;top:70px;left:8px;right:8px;width:auto;max-height:70vh;}}
  .cities-menu.open{display:block;}
  .cities-menu-search{padding:0.5rem 0.65rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(20,46,92,0.99);}
  .cities-menu-search input{width:100%;background:rgba(20,40,80,0.7);border:1px solid var(--border);border-radius:6px;padding:0.35rem 0.6rem;color:var(--text-primary);font-size:0.8rem;font-family:'Inter',sans-serif;outline:none;}
  .cities-menu-search input:focus{border-color:var(--accent-blue);}
  .cities-group-label{font-size:0.58rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;padding:0.55rem 0.75rem 0.2rem;background:rgba(20,46,92,0.99);}
  .city-menu-item{padding:0.5rem 0.75rem;cursor:pointer;font-size:0.82rem;transition:background 0.15s;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;}
  .city-menu-item:hover{background:rgba(50,120,255,0.15);}
  .city-menu-item.active{background:rgba(50,180,255,0.1);color:var(--accent-blue);}
  .city-menu-item.pinned-item{color:var(--accent-yellow);}
  .city-menu-item .cmi-temp{font-family:'Roboto',sans-serif;font-size:0.75rem;color:var(--accent-blue);font-weight:700;}
  .city-menu-item .cmi-pin{font-size:0.7rem;opacity:0.6;}

  /* right side of header */
  .header-right{margin-left:auto;display:flex;align-items:center;gap:0.75rem;flex-shrink:0;}
  .update-badge{font-size:0.68rem;color:var(--text-muted);background:rgba(20,40,80,0.5);border:1px solid var(--border);padding:0.22rem 0.55rem;border-radius:20px;white-space:nowrap;display:flex;align-items:center;gap:0.35rem;}
  .update-badge .dot{display:inline-block;width:6px;height:6px;background:var(--risk-none);border-radius:50%;flex-shrink:0;animation:pulse 2s infinite;}
  .update-badge.updating .dot{background:var(--accent-yellow);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .countdown-text{font-size:0.62rem;color:var(--text-muted);}
  .refresh-btn{background:rgba(20,40,80,0.6);border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;padding:0.28rem 0.6rem;font-size:0.72rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.3rem;white-space:nowrap;}
  .refresh-btn:hover{border-color:var(--border-glow);color:var(--text-primary);}
  .refresh-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .refresh-btn .spin{display:inline-block;}
  .refresh-btn.loading .spin{animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── MAIN ── */
  .main-panel{padding:1.5rem;max-width:1100px;margin:0 auto;}

  /* welcome / no-selection */
  .welcome-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;gap:1rem;text-align:center;}
  .welcome-state .big-leaf{font-size:4rem;}
  .welcome-state h2{font-family:'Orbitron',sans-serif;font-size:1.2rem;color:var(--accent-blue);}
  .welcome-state p{font-size:0.85rem;color:var(--text-muted);max-width:360px;line-height:1.6;}
  .pin-manager{background:var(--bg-card);border:1px solid rgba(255,224,102,0.25);border-radius:var(--radius);padding:1.25rem 1.5rem;width:100%;max-width:420px;margin-top:0.5rem;text-align:left;}
  .pin-manager-title{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:var(--accent-yellow);text-transform:uppercase;margin-bottom:0.85rem;}
  .pin-manager-row{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0.6rem;border-radius:8px;background:rgba(255,224,102,0.06);border:1px solid rgba(255,224,102,0.15);margin-bottom:0.45rem;cursor:pointer;transition:all 0.15s;}
  .pin-manager-row:hover{background:rgba(255,224,102,0.12);}
  .pin-manager-row .pmr-left{display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;font-weight:600;color:var(--text-primary);}
  .pin-manager-row .pmr-temp{font-family:'Roboto',sans-serif;font-size:0.8rem;color:var(--accent-blue);font-weight:700;}
  .pin-manager-row .pmr-remove{background:none;border:none;color:var(--text-muted);font-size:0.95rem;cursor:pointer;padding:2px 5px;border-radius:4px;transition:all 0.15s;line-height:1;}
  .pin-manager-row .pmr-remove:hover{color:var(--accent-red);background:rgba(255,77,77,0.1);}
  .pin-manager-empty{font-size:0.8rem;color:var(--text-muted);font-style:italic;}
  .pin-manager-hint{font-size:0.7rem;color:var(--text-muted);margin-top:0.75rem;line-height:1.5;}

  /* loading */
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:1rem;}
  .spinner{width:48px;height:48px;border:3px solid rgba(50,180,255,0.2);border-top-color:var(--accent-blue);border-radius:50%;animation:spin 0.8s linear infinite;}

  /* current hero */
  .current-hero{background:var(--bg-card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
  .current-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(50,180,255,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
  .city-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
  .city-title{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:0.6rem;}
  .city-province{font-size:0.875rem;color:var(--text-muted);margin-top:2px;}
  .city-time{font-size:0.75rem;color:var(--text-muted);text-align:right;}
  .hero-pin-btn{display:inline-flex;align-items:center;gap:0.35rem;background:rgba(255,224,102,0.08);border:1px solid rgba(255,224,102,0.25);border-radius:20px;padding:0.25rem 0.7rem;font-size:0.72rem;font-family:'Inter',sans-serif;font-weight:600;color:var(--accent-yellow);cursor:pointer;transition:all 0.2s;white-space:nowrap;vertical-align:middle;}
  .hero-pin-btn:hover{background:rgba(255,224,102,0.18);border-color:var(--accent-yellow);transform:scale(1.04);}
  .hero-pin-btn.pinned{background:rgba(255,224,102,0.15);border-color:var(--accent-yellow);}
  .hero-pin-btn.pinned:hover{background:rgba(255,77,77,0.12);border-color:var(--accent-red);color:var(--accent-red);}
  .conditions-grid{display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:1.25rem;align-items:center;}
  @media(max-width:700px){.conditions-grid{grid-template-columns:auto 1fr;}}
  .big-temp{font-family:'Roboto',sans-serif;font-size:3.5rem;font-weight:900;color:var(--text-primary);line-height:1;}
  .big-temp-unit{font-size:1.2rem;vertical-align:super;color:var(--text-muted);}
  .weather-icon-big{font-size:3.5rem;text-align:center;line-height:1;}
  .weather-icon-big .wi{font-size:3.2rem;filter:drop-shadow(0 0 8px rgba(0,0,0,0.3));}
  .condition-block{display:flex;flex-direction:column;gap:2px;}
  .condition-label{font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;}
  .condition-value{font-size:0.95rem;font-weight:600;color:var(--text-primary);}
  .weather-desc{font-size:1rem;color:var(--accent-blue);font-weight:500;margin:0.75rem 0 0;}
  .risk-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
  @media(max-width:600px){.risk-row{grid-template-columns:1fr;}}
  .risk-panel{background:var(--bg-card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
  .risk-panel-title{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.9rem;}
  .risk-value{font-family:'Roboto',sans-serif;font-size:2.2rem;font-weight:900;line-height:1;}
  .risk-label{font-size:0.8rem;font-weight:700;margin-top:0.3rem;text-transform:uppercase;letter-spacing:0.05em;}
  .risk-bar-wrap{margin-top:0.75rem;height:8px;background:rgba(30,60,120,0.4);border-radius:4px;overflow:hidden;}
  .risk-bar{height:100%;border-radius:4px;transition:width 1s ease;}
  .risk-scale{display:flex;gap:4px;margin-top:0.6rem;flex-wrap:wrap;}
  .risk-scale-item{font-size:0.6rem;padding:2px 6px;border-radius:4px;font-weight:600;border:1px solid rgba(255,255,255,0.1);}
  .forecast-section{margin-bottom:1.25rem;}
  .section-title{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.75rem;}
  .forecast-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0.75rem;}
  @media(max-width:700px){.forecast-grid{grid-template-columns:repeat(3,1fr);}}
  .forecast-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:0.85rem 0.65rem;text-align:center;transition:all 0.2s;}
  .forecast-card:hover{border-color:var(--border-glow);transform:translateY(-2px);}
  .forecast-day{font-size:0.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem;}
  .forecast-icon{font-size:2rem;margin-bottom:0.4rem;line-height:1;}
  .forecast-icon .wi{font-size:1.9rem;filter:drop-shadow(0 0 4px rgba(0,0,0,0.25));}
  .forecast-temps{font-size:0.9rem;font-weight:700;font-family:'Roboto',sans-serif;margin-bottom:0.6rem;}
  .forecast-hi{color:var(--text-primary);}
  .forecast-lo{color:var(--text-muted);}
  .forecast-precip{font-size:0.68rem;color:var(--accent-blue);margin-bottom:0.5rem;}
  .forecast-risks{display:flex;flex-direction:column;gap:3px;}
  .forecast-risk-row{display:flex;align-items:center;justify-content:space-between;font-size:0.6rem;}
  .forecast-risk-row .label{color:var(--text-muted);}
  .risk-chip{font-size:0.58rem;padding:1px 5px;border-radius:4px;font-weight:700;text-transform:uppercase;}
  .conditions-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:0.75rem;margin-bottom:1.25rem;}
  .cond-tile{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:0.85rem 0.75rem;display:flex;flex-direction:column;gap:4px;}
  .cond-tile-icon{font-size:1.3rem;} .cond-tile-label{font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;} .cond-tile-value{font-size:1rem;font-weight:700;color:var(--text-primary);}
  .alert-banner{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.4);border-radius:10px;padding:0.75rem 1rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:0.75rem;font-size:0.85rem;}
  /* hourly strip */
  .hourly-strip{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:0.9rem 1rem;margin-bottom:1.25rem;overflow:hidden;}
  .hourly-strip-title{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.7rem;}
  .hourly-scroll{display:flex;gap:0;overflow-x:auto;scrollbar-width:thin;}
  .hourly-scroll::-webkit-scrollbar{height:4px;}
  .hourly-scroll::-webkit-scrollbar-thumb{background:rgba(80,140,255,0.3);border-radius:2px;}
  .hourly-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:0.4rem 0.75rem;flex-shrink:0;border-right:1px solid var(--border);}
  .hourly-item:last-child{border-right:none;}
  .hourly-item:first-child{padding-left:0;}
  .hourly-time{font-size:0.65rem;color:var(--text-muted);font-weight:600;white-space:nowrap;}
  .hourly-icon .wi{font-size:1.1rem;filter:drop-shadow(0 0 3px rgba(0,0,0,0.2));}
  .hourly-temp{font-family:'Roboto',sans-serif;font-size:0.88rem;font-weight:700;color:var(--text-primary);}
  .hourly-precip{font-size:0.6rem;color:var(--accent-blue);}
  /* ── TWO-COLUMN ROWS ── */
  /* Row 1: current hero (left) + hourly strip (right) */
  .hero-hourly-row{display:grid;grid-template-columns:1.1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;align-items:start;}
  @media(max-width:900px){.hero-hourly-row{grid-template-columns:1fr;}}
  /* Row 2: conditions tiles (left) + EC alerts (right) */
  .conds-alerts-row{display:grid;grid-template-columns:1fr 310px;gap:1.25rem;margin-bottom:1.25rem;align-items:start;}
  @media(max-width:900px){.conds-alerts-row{grid-template-columns:1fr;}}
  .conditions-col{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;}
  /* EC alerts panel */
  .ec-alerts-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;}
  .ec-alerts-title{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.4rem;}
  .ec-alert-item{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:8px;padding:0.65rem 0.75rem;margin-bottom:0.5rem;font-size:0.78rem;}
  .ec-alert-item.warning{background:rgba(231,76,60,0.12);border-color:rgba(231,76,60,0.4);}
  .ec-alert-item.watch{background:rgba(230,126,34,0.12);border-color:rgba(230,126,34,0.4);}
  .ec-alert-item.advisory{background:rgba(241,196,15,0.1);border-color:rgba(241,196,15,0.35);}
  .ec-alert-type{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;}
  .ec-alert-type.warning{color:#e74c3c;}
  .ec-alert-type.watch{color:#e67e22;}
  .ec-alert-type.advisory{color:#f1c40f;}
  .ec-alert-headline{font-weight:600;color:var(--text-primary);line-height:1.4;}
  .ec-alert-none{font-size:0.8rem;color:var(--text-muted);display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0;}
  .ec-alert-link{font-size:0.68rem;color:var(--accent-blue);text-decoration:none;display:block;margin-top:0.6rem;}
  .ec-alert-link:hover{text-decoration:underline;}
  .ec-loading{font-size:0.75rem;color:var(--text-muted);animation:pulse 1.5s infinite;}

  /* risk colours */
  .risk-color-none{color:#2ecc71} .risk-color-slight{color:#27ae60} .risk-color-low{color:#a3d977} .risk-color-marginal{color:#f1c40f} .risk-color-moderate{color:#f39c12} .risk-color-high{color:#e74c3c} .risk-color-extreme{color:#c0392b} .risk-color-very-high{color:#ff6b35}
  .bg-none{background:rgba(46,204,113,0.2);color:#2ecc71} .bg-slight{background:rgba(39,174,96,0.25);color:#2ecc71} .bg-low{background:rgba(163,217,119,0.2);color:#a3d977} .bg-marginal{background:rgba(241,196,15,0.2);color:#f1c40f} .bg-moderate{background:rgba(230,126,34,0.25);color:#e67e22} .bg-high{background:rgba(231,76,60,0.25);color:#e74c3c} .bg-extreme{background:rgba(192,57,43,0.3);color:#e74c3c} .bg-very-high{background:rgba(255,107,53,0.25);color:#ff6b35}

  @media(max-width:768px){.hide-mobile{display:none!important;}.countdown-text{display:none;}}
  ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(50,100,200,0.3);border-radius:3px;}
</style>
</head>
<body>

<!-- VERSION BANNER -->
<div id="versionBanner" style="background:#ffe066;color:#07111e;text-align:center;padding:6px;font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.05em">
  ✅ Canadian StormCast v1.6.7 — Host on tiiny.host for Safari + Chrome + iPhone support
  <button onclick="document.getElementById('versionBanner').style.display='none'" style="margin-left:1rem;background:rgba(0,0,0,0.15);border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:0.75rem">✕ dismiss</button>
</div>
<!-- ── HEADER ── -->
<header class="header">
  <div class="logo">🍁 Canadian <span>Storm</span>Cast</div>

// ── RISK HELPERS ────────────────────────────────────────────────────────
const RT={prairies:1.0,ontario:0.55,quebec:0.35,maritimes:0.18,west_coast:0.04,interior_bc:0.12};
const RS={prairies:1.0,ontario:0.85,quebec:0.75,maritimes:0.6,west_coast:0.35,interior_bc:0.5};
function sf(m){return[0.08,0.08,0.15,0.35,0.65,1.0,1.0,0.85,0.5,0.25,0.1,0.08][Math.max(0,Math.min(11,m-1))];}
function tornadoRisk(cape,li,gust,region,month){cape=cape||0;li=(li==null)?2:li;let b=0;if(cape>2500&&li<-6)b=55;else if(cape>2000&&li<-5)b=38;else if(cape>1500&&li<-4)b=24;else if(cape>1000&&li<-3)b=15;else if(cape>700&&li<-2)b=9;else if(cape>400&&li<-1)b=5;else if(cape>200&&li<0)b=2.5;else if(cape>50)b=0.8;if(gust>80)b*=1.3;else if(gust>60)b*=1.15;return Math.max(0,Math.min(Math.round(b*sf(month)*(RT[region]||0.3)),85));}
function thunderRisk(cape,li,pp,wc,gust,region,month){cape=cape||0;li=(li==null)?2:li;pp=pp||0;let b=0;if([95,96,99].includes(wc))b=Math.max(b,55+Math.min(pp*0.25,25));if(cape>2000&&li<-5)b=Math.max(b,60);else if(cape>1500&&li<-4)b=Math.max(b,48);else if(cape>1000&&li<-3)b=Math.max(b,36);else if(cape>700&&li<-2)b=Math.max(b,26);else if(cape>400&&li<-1)b=Math.max(b,18);else if(cape>200&&li<0)b=Math.max(b,10);else if(cape>50)b=Math.max(b,4);b+=pp*0.18;if(gust>80)b*=1.2;return Math.max(0,Math.min(Math.round(b*sf(month)*(RS[region]||0.6)),90));}

function getWiColor(wiClass){
  if(WI_COLORS[wiClass])return WI_COLORS[wiClass];
  // Pattern fallback
  if(wiClass.includes('sunny'))return'#FFB300';
  if(wiClass.includes('thunderstorm')||wiClass.includes('storm'))return'#455A64';
  if(wiClass.includes('rain-mix')||wiClass.includes('freezing'))return'#7986CB';
  if(wiClass.includes('rain')||wiClass.includes('showers'))return'#1E88E5';
  if(wiClass.includes('snow')||wiClass.includes('snowflake'))return'#90CAF9';
  if(wiClass.includes('sprinkle')||wiClass.includes('drizzle'))return'#64B5F6';
  if(wiClass.includes('fog'))return'#B0BEC5';
  if(wiClass.includes('cloud'))return'#78909C';
  if(wiClass.includes('night'))return'#90A4AE';
  return'#78909C';
}

function wmoInfo(code,isDay=1){
  const d=isDay===1||isDay===true?'day':'night';
  const map={

    57:{desc:'Freezing Drizzle',       wiClass:'wi-rain-mix'},

    63:{desc:'Moderate Rain',          wiClass:'wi-rain'},
    65:{desc:'Heavy Rain',             wiClass:'wi-rain'},
    66:{desc:'Freezing Rain',          wiClass:'wi-rain-mix'},

    73:{desc:'Moderate Snow',          wiClass:'wi-snow'},
    75:{desc:'Heavy Snow',             wiClass:'wi-snow-wind'},

    80:{desc:'Light Showers',          wiClass:d==='day'?'wi-day-showers':'wi-night-alt-showers'},
    81:{desc:'Moderate Showers',       wiClass:'wi-showers'},
    82:{desc:'Heavy Showers',          wiClass:'wi-storm-showers'},
    85:{desc:'Snow Showers',           wiClass:'wi-snow'},
    86:{desc:'Heavy Snow Showers',     wiClass:'wi-snow-wind'},
    95:{desc:'Thunderstorm',           wiClass:d==='day'?'wi-day-thunderstorm':'wi-night-alt-thunderstorm'},
    96:{desc:'T-Storm w/ Hail',        wiClass:'wi-thunderstorm'},
    99:{desc:'Severe Thunderstorm',    wiClass:'wi-thunderstorm'},
  };
  if(map[code])return{...map[code],icon:null};
  // Range fallback — no more Unknown/N/A
  if(code>=0&&code<=3)return{desc:'Cloudy',wiClass:'wi-cloud',icon:null};
  if(code>=45&&code<=49)return{desc:'Foggy',wiClass:'wi-fog',icon:null};
  if(code>=50&&code<=59)return{desc:'Drizzle',wiClass:'wi-sprinkle',icon:null};
  if(code>=60&&code<=69)return{desc:'Rain',wiClass:'wi-rain',icon:null};
  if(code>=70&&code<=79)return{desc:'Snow',wiClass:'wi-snow',icon:null};
  if(code>=80&&code<=84)return{desc:'Showers',wiClass:'wi-showers',icon:null};
  if(code>=85&&code<=89)return{desc:'Snow Showers',wiClass:'wi-snow',icon:null};
  if(code>=90&&code<=99)return{desc:'Thunderstorm',wiClass:d==='day'?'wi-day-thunderstorm':'wi-night-alt-thunderstorm',icon:null};
  return{desc:d==='day'?'Partly Cloudy':'Clear',wiClass:d==='day'?'wi-day-cloudy':'wi-night-alt-cloudy',icon:null};
}
// Render a coloured weather icon using the wi font
function wiIcon(w){
  const cls=typeof w==='string'?w:(w&&w.wiClass?w.wiClass:'wi-cloud');

}

const CACHE_KEY='sc_weather_cache_v2';

}
function loadCache(cityId){
  try{
    const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');
    const entry=c[cityId];
    if(!entry)return null;
    if(Date.now()-entry.ts>CACHE_MAX_AGE)return null; // too old
    return{...entry.data,fromCache:true,cacheAge:Date.now()-entry.ts};
  }catch(e){return null;}
}

// Fetch with automatic proxy fallback for blocked networks
// ═══════════════════════════════════════════════════════
// SET YOUR CLOUDFLARE WORKER URL HERE after deploying it
// e.g. 'https://weather-proxy.yourname.workers.dev'
// Leave as '' to use public proxies only
const CUSTOM_PROXY = 'https://plain-bonus-eade.alexsiannas.workers.dev';
// ═══════════════════════════════════════════════════════

async function fetchWithFallback(url){
  const wrap=(p,via)=>p.then(r=>r.ok?r.json().then(d=>({d,via})):Promise.reject(new Error(r.status)));
  const wrapParsed=(p,via)=>p.then(r=>r.ok?r.json().then(j=>({d:JSON.parse(j.contents),via})):Promise.reject(new Error(r.status)));
  // Build parallel attempts — Cloudflare Worker first (bypasses all firewalls)
  const attempts=[];
  if(CUSTOM_PROXY){
    const wu=CUSTOM_PROXY.replace(/\/$/,'')+new URL(url).pathname+new URL(url).search;
    attempts.push(wrap(fetch(wu),'worker'));
  }
  attempts.push(wrap(fetch(url),'direct'));
  attempts.push(wrap(fetch('https://corsproxy.io/?'+encodeURIComponent(url)),'proxy1'));
  attempts.push(wrapParsed(fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url)),'proxy2'));
  attempts.push(wrap(fetch('https://thingproxy.freeboard.io/fetch/'+url),'proxy3'));
  // All fire simultaneously — first success wins
  const result=await Promise.race([
    new Promise((resolve,reject)=>{
      let n=0;
      attempts.forEach(p=>p.then(resolve).catch(()=>{if(++n===attempts.length)reject(new Error('All failed'));}));
    }),
    new Promise((_,r)=>setTimeout(()=>r(new Error('Timeout')),12000))
  ]);
  fetchMethod=result.via;
  return result.d;
}

async function fetchCityWeather(city){
  const url='https://api.open-meteo.com/v1/forecast?latitude='+city.lat+'&longitude='+city.lon+'&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,surface_pressure,is_day&hourly=cape,lifted_index,precipitation_probability,temperature_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,uv_index_max&timezone='+encodeURIComponent(city.tz)+'&forecast_days=5&wind_speed_unit=kmh&temperature_unit=celsius&precipitation_unit=mm';
  const data=await fetchWithFallback(url);
  // Compare ISO time strings directly — avoids browser timezone parsing issues.
  // Open-Meteo returns all times in the city's local timezone, so string compare is correct.
  const nowStr=data.current.time; // e.g. "2026-05-15T23:37"
  const hi=Math.max(0,data.hourly.time.findIndex(t=>t>=nowStr));
  const now=new Date(nowStr); // still needed for month calculation below
  const dailyCape=[],dailyLi=[];
  for(let d=0;d<5;d++){const s=d*24,e=s+24;const ca=data.hourly.cape.slice(s,e).filter(v=>v!==null);const li=data.hourly.lifted_index.slice(s,e).filter(v=>v!==null);dailyCape.push(ca.length?Math.max(...ca):0);dailyLi.push(li.length?Math.min(...li):2);}
  const cur=data.current,gust=cur.wind_gusts_10m||cur.wind_speed_10m;
  // Extract next 12 hours of hourly data
  const hourly12=[];
  for(let h=0;h<12;h++){
    const idx=hi+h;
    if(idx>=data.hourly.time.length)break;
    hourly12.push({time:data.hourly.time[idx],temp:Math.round(data.hourly.temperature_2m[idx]??0),wCode:data.hourly.weather_code[idx]??0,precipProb:data.hourly.precipitation_probability[idx]??0,wind:Math.round(data.hourly.wind_speed_10m[idx]??0)});
  }
  // UV Index (today's max)
  const uvIndex=data.daily.uv_index_max?Math.round(data.daily.uv_index_max[0]??0):null;
  return{city,month:now.getMonth()+1,hourly12,uvIndex,current:{temp:Math.round(cur.temperature_2m),feels:Math.round(cur.apparent_temperature),humidity:cur.relative_humidity_2m,wCode:cur.weather_code,wind:Math.round(cur.wind_speed_10m),windDir:cur.wind_direction_10m,windGust:Math.round(gust),precip:cur.precipitation,pressure:Math.round(cur.surface_pressure),isDay:cur.is_day,time:cur.time,cape:Math.round(data.hourly.cape[hi]??0),li:data.hourly.lifted_index[hi]!=null?Math.round((data.hourly.lifted_index[hi]??2)*10)/10:null,precipProb:data.hourly.precipitation_probability[hi]??0},daily:data.daily,dailyCape,dailyLi};
}

  try{
    const url='https://air-quality-api.open-meteo.com/v1/air-quality?latitude='+city.lat+'&longitude='+city.lon+'&current=us_aqi,pm2_5,pm10&timezone='+encodeURIComponent(city.tz);
    const res=await Promise.race([fetch(url),new Promise((_,r)=>setTimeout(()=>r(new Error('t/o')),6000))]);
    if(!res.ok)throw new Error();
    const data=await res.json();
    return{ok:true,aqi:Math.round(data.current.us_aqi??0),pm25:data.current.pm2_5,pm10:data.current.pm10};
  }catch(e){return{ok:false,aqi:null};}
}
function aqiLabel(aqi){
  if(aqi===null||aqi===undefined)return{label:'Unavailable',cls:'none',color:'var(--text-muted)',icon:'🌿'};
  if(aqi<=50) return{label:'Low Risk',cls:'none',color:'#2ecc71',icon:'🌿'};
  if(aqi<=100)return{label:'Moderate Risk',cls:'marginal',color:'#f1c40f',icon:'😐'};
  if(aqi<=150)return{label:'High Risk',cls:'moderate',color:'#e67e22',icon:'😷'};
  return         {label:'Very High Risk',cls:'high',color:'#e74c3c',icon:'☣️'};
}
function uvLabel(uv){
  if(uv===null||uv===undefined)return{label:'N/A',color:'var(--text-muted)',icon:'🌞'};
  if(uv<=2) return{label:'Low',color:'#2ecc71',icon:'🌞'};
  if(uv<=5) return{label:'Moderate',color:'#f1c40f',icon:'🌤️'};
  if(uv<=7) return{label:'High',color:'#e67e22',icon:'⚠️'};
  if(uv<=10)return{label:'Very High',color:'#e74c3c',icon:'🔴'};
  return       {label:'Extreme',color:'#9b59b6',icon:'☠️'};
}

function buildHourlyStrip(d,city){
  if(!d.hourly12||!d.hourly12.length)return'';
  const items=d.hourly12.map(h=>{
    // Parse hour directly from ISO string — no browser timezone ambiguity
    // h.time is e.g. "2026-05-15T23:00" already in city's local timezone
    const cityHour=parseInt((h.time||'T00').split('T')[1].split(':')[0]);
    const ampm=cityHour>=12?'PM':'AM';
    const h12=cityHour%12||12;
    const label=h12+' '+ampm;
    const w=wmoInfo(h.wCode,cityHour>=6&&cityHour<21?1:0);
    return'<div class="hourly-item">'+
      '<div class="hourly-time">'+label+'</div>'+
      '<div class="hourly-icon">'+wiIcon(w)+'</div>'+
      '<div class="hourly-temp">'+h.temp+'°</div>'+
      '<div class="hourly-precip">'+h.precipProb+'%</div>'+
      '</div>';
  }).join('');
  return'<div class="hourly-strip">'+
    '<div class="hourly-strip-title">🕐 12-Hour Forecast</div>'+
    '<div class="hourly-scroll">'+items+'</div>'+
    '</div>';
}

// ── EC ALERTS — Official MSC OGC API (api.weather.gc.ca) ─────────────────
// CORS-enabled, real-time, auto-refreshes every 3 minutes
const EC_ALERT_REFRESH_MS = 3 * 60 * 1000; // 3 minutes
const EC_PROV_URL = {
  BC:'bc',AB:'ab',SK:'sk',MB:'mb',ON:'on',QC:'qc',
  NB:'nb',NS:'ns',NL:'nl',PE:'pe',YT:'yt',NT:'nt',NU:'nu'
};
let alertRefreshTimer=null;
let lastAlertData={};
let alertLastChecked={};
let alertNextCheck={};
let alertCountdownTimer=null;

function ecProvUrl(province){
  const code=(EC_PROV_URL[province]||'on');
  return 'https://weather.gc.ca/warnings/report_e.html?'+code;
}

async function fetchECAlerts(city){
  const prov=city.province;
  try{
    const url='https://api.weather.gc.ca/collections/weather-alerts/items?f=json&lang=en&limit=30&sortby=-publication_datetime&province='+prov;
    const res=await Promise.race([
      fetch(url),
      new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),7000))
    ]);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const features=data.features||[];
    // Sort: warnings > watches > advisories > statements
    const pri={warning:0,watch:1,advisory:2,statement:3};
    features.sort((a,b)=>(pri[a.properties.alert_type]??9)-(pri[b.properties.alert_type]??9));
    // STRICT city-only matching — NO province fallback
    // Word-boundary safe: 'London' won't match 'New London'
    const cityName=city.name.toLowerCase();
    const alerts=features.filter(f=>{
      const area=(f.properties.feature_name_en||'').toLowerCase();
      // Must start with city name or have it after a separator
      return area===cityName||
             area.startsWith(cityName+' ')||
             area.startsWith(cityName+',')||
             area.startsWith(cityName+'-')||
             area.includes(' '+cityName+' ')||
             area.includes(' '+cityName+',')||
             area.includes(' '+cityName+'-')||
             area.includes('-'+cityName+' ')||
             area.includes('-'+cityName+',');
    });
    // Detect new alerts since last check
    const prev=lastAlertData[prov];
    const prevIds=new Set((prev&&prev.alerts||[]).map(f=>f.properties.id));
    const newAlertIds=new Set(alerts.filter(f=>!prevIds.has(f.properties.id)).map(f=>f.properties.id));
    lastAlertData[prov]={ok:true,alerts,newAlertIds,total:features.length,city};
    alertLastChecked[prov]=Date.now();
    alertNextCheck[prov]=Date.now()+EC_ALERT_REFRESH_MS;
    return lastAlertData[prov];
  }catch(e){
    console.warn('EC alerts failed:',e.message);
    alertLastChecked[prov]=Date.now();
    alertNextCheck[prov]=Date.now()+EC_ALERT_REFRESH_MS;
    lastAlertData[prov]={ok:false,city};
    return lastAlertData[prov];
  }
}

function renderECAlerts(result,city){
  const ecUrl=ecProvUrl(city.province);
  const lastCheck=alertLastChecked[city.province];
  const msAgo=lastCheck?(Date.now()-lastCheck):null;
  const agoStr=msAgo===null?'':(msAgo<60000?'just now':Math.round(msAgo/60000)+'m ago');
  const nextMs=alertNextCheck[city.province]?Math.max(0,alertNextCheck[city.province]-Date.now()):null;
  const nextStr=nextMs!==null?(nextMs<60000?Math.ceil(nextMs/1000)+'s':Math.ceil(nextMs/60000)+'m'):'';

  const footer='<div style="margin-top:0.7rem;border-top:1px solid var(--border);padding-top:0.55rem;display:flex;flex-direction:column;gap:4px">'+
    '<a href="'+ecUrl+'" target="_blank" style="font-size:0.68rem;color:var(--accent-blue);text-decoration:none;display:flex;align-items:center;gap:4px">'+
      '🍁 View EC warnings page for '+city.province+' ↗'+
    '</a>'+
    '<div style="display:flex;justify-content:space-between;font-size:0.6rem;color:var(--text-muted)">'+
      '<span>Checked: '+agoStr+'</span>'+
      '<span id="alertCountdown">'+( nextStr?'Next: '+nextStr:'')+'</span>'+
    '</div>'+
  '</div>';

  if(!result||!result.ok){
    return'<div id="ecAlertsPanel" class="ec-alerts-panel">'+
      '<div class="ec-alerts-title"><span style="color:#e74c3c;animation:pulse 1.5s infinite">●</span> EC Alerts — '+city.province+'</div>'+
      '<div class="ec-alert-none" style="color:#e67e22">⚠️ Could not reach Environment Canada API. Check your connection.</div>'+
      footer+'</div>';
  }
  if(!result.alerts||result.alerts.length===0){
    return'<div id="ecAlertsPanel" class="ec-alerts-panel">'+
      '<div class="ec-alerts-title"><span style="color:var(--risk-none);animation:pulse 2s infinite">●</span> EC Alerts — '+city.name+'</div>'+
      '<div class="ec-alert-none"><span>✅</span> No active alerts for '+city.name+' ('+city.province+')</div>'+
      footer+'</div>';
  }
  const typeConfig={
    warning: {icon:'🔴',label:'WARNING',  color:'#e74c3c',bg:'rgba(231,76,60,0.13)',border:'rgba(231,76,60,0.45)'},
    watch:   {icon:'🟠',label:'WATCH',    color:'#e67e22',bg:'rgba(230,126,34,0.13)',border:'rgba(230,126,34,0.45)'},
    advisory:{icon:'🟡',label:'ADVISORY', color:'#f1c40f',bg:'rgba(241,196,15,0.10)',border:'rgba(241,196,15,0.35)'},
    statement:{icon:'🔵',label:'STATEMENT',color:'#5cc8ff',bg:'rgba(92,200,255,0.08)',border:'rgba(92,200,255,0.25)'},
  };
  const dotColor=result.alerts.some(f=>f.properties.alert_type==='warning')?'#e74c3c':
    result.alerts.some(f=>f.properties.alert_type==='watch')?'#e67e22':'#f1c40f';
  const shown=result.alerts.slice(0,8);
  const items=shown.map(f=>{
    const p=f.properties;
    const cfg=typeConfig[p.alert_type]||typeConfig.advisory;
    const isNew=result.newAlertIds&&result.newAlertIds.has(p.id);
    const title=(p.alert_name_en||p.alert_type||'Alert').replace(/^./,c=>c.toUpperCase());
    const area=p.feature_name_en||'';
    const pubDate=p.publication_datetime?new Date(p.publication_datetime).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}):'';
    const expDate=p.expiration_datetime?new Date(p.expiration_datetime).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}):'Unknown';
    const snippet=(p.alert_text_en||'').split('\n').filter(l=>l.trim()).slice(0,3).join(' ').slice(0,150);
    return'<div style="background:'+cfg.bg+';border:1px solid '+cfg.border+';border-radius:8px;padding:0.6rem 0.75rem;margin-bottom:0.45rem">'+
      '<div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:3px;flex-wrap:wrap">'+
        '<span>'+cfg.icon+'</span>'+
        '<span style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:'+cfg.color+'">'+cfg.label+'</span>'+
        (isNew?'<span style="font-size:0.55rem;background:#e74c3c;color:#fff;border-radius:3px;padding:1px 4px;font-weight:700">NEW</span>':'')+
        '<span style="font-size:0.58rem;color:var(--text-muted);margin-left:auto">Expires '+expDate+'</span>'+
      '</div>'+
      '<div style="font-weight:700;color:var(--text-primary);font-size:0.82rem;line-height:1.3">'+title+'</div>'+
      (area?'<div style="font-size:0.68rem;color:var(--text-muted);margin-top:2px">📍 '+area+'</div>':'')+
      (pubDate?'<div style="font-size:0.6rem;color:var(--text-muted);margin-top:1px">Issued: '+pubDate+'</div>':'')+
      (snippet?'<div style="font-size:0.7rem;color:var(--text-secondary);margin-top:5px;line-height:1.45">'+snippet+(snippet.length>=150?'…':'')+'</div>':'')+
    '</div>';
  }).join('');
  const extra=result.alerts.length>8?'<div style="font-size:0.7rem;color:var(--text-muted);text-align:center;padding:4px 0">+'+( result.alerts.length-8)+' more alerts for '+city.province+'</div>':'';
  return'<div id="ecAlertsPanel" class="ec-alerts-panel">'+
    '<div class="ec-alerts-title">'+
      '<span style="color:'+dotColor+';animation:pulse 1.5s infinite">●</span> '+
      'EC Alerts — '+city.name+
      '<span style="font-size:0.6rem;margin-left:4px;color:var(--text-muted);font-weight:400">('+result.alerts.length+' active)</span>'+
    '</div>'+
    items+extra+footer+
  '</div>';
}

// Live countdown updater for the alerts panel
function startAlertCountdown(){
  clearInterval(alertCountdownTimer);
  alertCountdownTimer=setInterval(()=>{
    const id=state.selectedCity;
    if(!id)return;
    const city=CITIES.find(c=>c.id===id);
    if(!city)return;
    const nextMs=alertNextCheck[city.province]?Math.max(0,alertNextCheck[city.province]-Date.now()):null;
    const el=document.getElementById('alertCountdown');
    if(el&&nextMs!==null)el.textContent='Next: '+(nextMs<60000?Math.ceil(nextMs/1000)+'s':Math.ceil(nextMs/60000)+'m');
  },1000);
}

// Auto-refresh EC alerts every 3 minutes — independent of weather refresh
function startAlertAutoRefresh(){
  if(alertRefreshTimer)clearInterval(alertRefreshTimer);
  startAlertCountdown();
  alertRefreshTimer=setInterval(async()=>{
    const id=state.selectedCity;
    if(!id)return;
    const city=CITIES.find(c=>c.id===id);
    if(!city)return;
    const result=await fetchECAlerts(city);
    const el=document.getElementById('ecAlertsPanel');
    if(el)el.outerHTML=renderECAlerts(result,city);
    startAlertCountdown();
  },EC_ALERT_REFRESH_MS);
}

// UV Index + Air Quality row

  const uv=d.uvIndex??null;
  const uvL=uvLabel(uv);
  const aqData=d.aqData||null;
  const aqiVal=aqData&&aqData.ok?aqData.aqi:null;
  const aqL=aqiLabel(aqiVal);
  // Trigger AQ fetch if not yet loaded
  if(!d.aqData){
    fetchAirQuality(city).then(r=>{
      const cityData=state.cityData[city.id];
      if(cityData){cityData.aqData=r;if(state.selectedCity===city.id){const el=document.getElementById('uvAqRow');if(el){const aqL2=aqiLabel(r.ok?r.aqi:null);el.querySelector('#aqValue').innerHTML=aqL2.icon+' <strong style="color:'+aqL2.color+'">'+aqL2.label+'</strong>'+(r.ok&&r.aqi!==null?' <span style="font-size:0.65rem;color:var(--text-muted)">(AQI '+r.aqi+')</span>':'');}}}
    });
  }
  const uvPct=Math.min((uv||0)/12*100,100);
  const aqPct=Math.min((aqiVal||0)/200*100,100);
  return'<div id="uvAqRow" style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem">'+
    // UV Index tile
    '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem">'+
      '<div style="font-size:0.62rem;font-weight:700;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.6rem">☀️ UV Index</div>'+
      '<div style="display:flex;align-items:baseline;gap:0.5rem;margin-bottom:4px">'+
        '<span style="font-family:Roboto,sans-serif;font-size:2rem;font-weight:900;color:'+uvL.color+'">'+(uv!==null?uv:'—')+'</span>'+
        '<span style="font-size:0.8rem;font-weight:700;color:'+uvL.color+'">'+uvL.label+'</span>'+
      '</div>'+
      '<div style="height:6px;background:rgba(40,70,140,0.4);border-radius:3px;overflow:hidden;margin-top:6px">'+
        '<div style="height:100%;width:'+uvPct+'%;background:'+uvL.color+';border-radius:3px;transition:width 1s"></div>'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;font-size:0.58rem;color:var(--text-muted);margin-top:4px"><span>Low</span><span>Moderate</span><span>High</span><span>Extreme</span></div>'+
    '</div>'+
    // Air Quality tile
    '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem">'+
      '<div style="font-size:0.62rem;font-weight:700;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.6rem">🌿 Air Quality</div>'+
      '<div id="aqValue" style="display:flex;align-items:center;gap:0.5rem;margin-bottom:4px;flex-wrap:wrap">'+
        aqL.icon+' <strong style="color:'+aqL.color+';font-size:0.9rem">'+aqL.label+'</strong>'+(aqiVal!==null?' <span style="font-size:0.65rem;color:var(--text-muted)">(AQI '+aqiVal+')</span>':'<span style="font-size:0.7rem;color:var(--text-muted)">Loading…</span>')+
      '</div>'+
      '<div style="height:6px;background:rgba(40,70,140,0.4);border-radius:3px;overflow:hidden;margin-top:6px">'+
        '<div style="height:100%;width:'+aqPct+'%;background:'+aqL.color+';border-radius:3px;transition:width 1s"></div>'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;font-size:0.58rem;color:var(--text-muted);margin-top:4px"><span>Low</span><span>Moderate</span><span>High</span><span>Very High</span></div>'+
    '</div>'+
  '</div>';
}

function buildRiskPanel(type,risk,lbl){
  const isTornado=type==='tornado';
  const title=isTornado?'🌪️ Tornado Risk':'⛈️ Thunderstorm Risk';
  const maxR=isTornado?85:90,pct=Math.min((risk/maxR)*100,100),color=rbc(lbl.cls);
  const items=isTornado?[{r:'0-2%',l:'Slight',c:'slight'},{r:'3-10%',l:'Low',c:'low'},{r:'11-25%',l:'Marginal',c:'marginal'},{r:'26-49%',l:'Moderate',c:'moderate'},{r:'51-75%',l:'High',c:'high'},{r:'76-85%',l:'Extreme',c:'extreme'}]:[{r:'0-5%',l:'Slight',c:'slight'},{r:'6-15%',l:'Low',c:'low'},{r:'16-25%',l:'Marginal',c:'marginal'},{r:'26-49%',l:'Moderate',c:'moderate'},{r:'51-75%',l:'High',c:'high'},{r:'76-90%',l:'Very High',c:'very-high'}];
  return'<div class="risk-panel"><div class="risk-panel-title">'+title+'</div><div class="risk-value risk-color-'+lbl.cls+'">'+risk+'%</div><div class="risk-label risk-color-'+lbl.cls+'">'+lbl.label+' Risk</div><div class="risk-bar-wrap"><div class="risk-bar" style="width:'+pct+'%;background:'+color+'"></div></div><div class="risk-scale">'+items.map(s=>'<span class="risk-scale-item bg-'+s.c+'" title="'+s.r+'">'+s.l+'</span>').join('')+'</div></div>';
}

function buildLegend(type){
  const isTornado=type==='tornado';
  const title=isTornado?'🌪️ Tornado Risk Scale':'⛈️ Thunderstorm Risk Scale';
  const items=isTornado?[{l:'Slight',c:'slight',n:'Isolated, non-threatening'},{l:'Low',c:'low',n:'Possible in unstable areas'},{l:'Marginal',c:'marginal',n:'Elevated, monitor conditions'},{l:'Moderate',c:'moderate',n:'Significant threat, prepare'},{l:'High',c:'high',n:'Dangerous conditions likely'},{l:'Extreme',c:'extreme',n:'Life-threatening situation'}]:[{l:'Slight',c:'slight',n:'Isolated chance'},{l:'Low',c:'low',n:'Scattered storms possible'},{l:'Marginal',c:'marginal',n:'Storms likely in region'},{l:'Moderate',c:'moderate',n:'Widespread storm activity'},{l:'High',c:'high',n:'Severe storms expected'},{l:'Very High',c:'very-high',n:'Dangerous, widespread severe'}];
  return'<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem"><div class="section-title">'+title+'</div><div style="display:flex;flex-direction:column;gap:5px">'+items.map(i=>'<div style="display:flex;align-items:center;gap:8px;font-size:0.7rem"><strong class="risk-color-'+i.c+'" style="min-width:80px">'+i.l+'</strong><span style="color:var(--text-muted)">'+i.n+'</span></div>').join('')+'</div></div>';
}

function buildForecast(d,city){
  const daily=d.daily,days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return daily.time.slice(0,5).map((dateStr,i)=>{
    const date=new Date(dateStr+'T12:00:00'),dayLabel=i===0?'Today':days[date.getDay()];
    const wc=daily.weather_code[i],w=wmoInfo(wc,1);
    const hi=Math.round(daily.temperature_2m_max[i]),lo=Math.round(daily.temperature_2m_min[i]);
    const precip=(daily.precipitation_sum[i]||0).toFixed(1),pp=daily.precipitation_probability_max[i]||0;
    const gust=Math.round(daily.wind_gusts_10m_max[i]||daily.wind_speed_10m_max[i]||0);
    const tr=tornadoRisk(d.dailyCape[i]||0,d.dailyLi[i]??2,gust,city.region,date.getMonth()+1);
    const sr=thunderRisk(d.dailyCape[i]||0,d.dailyLi[i]??2,pp,wc,gust,city.region,date.getMonth()+1);
    const tl=tLbl(tr),sl=sLbl(sr);
    return'<div class="forecast-card"><div class="forecast-day">'+dayLabel+'</div><div style="font-size:0.65rem;color:var(--text-muted);margin-bottom:4px">'+dateStr.slice(5).replace('-','/')+'</div><div class="forecast-icon">'+wiIcon(w)+'</div><div class="forecast-temps"><span class="forecast-hi">'+hi+'°</span><span style="color:var(--text-muted)"> / </span><span class="forecast-lo">'+lo+'°</span></div><div class="forecast-precip">💧 '+precip+'mm · '+pp+'%</div><div class="forecast-risks"><div class="forecast-risk-row"><span class="label">🌪</span><span class="risk-chip bg-'+tl.cls+'">'+tr+'% '+tl.label+'</span></div><div class="forecast-risk-row"><span class="label">⛈</span><span class="risk-chip bg-'+sl.cls+'">'+sr+'% '+sl.label+'</span></div></div></div>';
  }).join('');
}

// ── LOAD / REFRESH ───────────────────────────────────────────────────────
const REFRESH_MS=15*60*1000;
let nextRefreshAt=null,countdownTimer=null;
function updateCountdown(){if(!nextRefreshAt)return;const ms=nextRefreshAt-Date.now();if(ms<=0){document.getElementById('countdownText').textContent='';return;}const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);document.getElementById('countdownText').textContent='Next update in '+m+':'+String(s).padStart(2,'0');}

// Fetch a single city with timeout, never throws — returns null on failure
async function loadOneCity(city){
  try{
    const data=await fetchCityWeather(city);
    data.fromCache=false;
    state.cityData[city.id]=data;
    saveCache(city.id,data); // ✅ save fresh data to cache
    if(state.pinnedCities.includes(city.id))renderPinnedPills();
    if(state.selectedCity===city.id)renderMain();
    return true;
  }catch(err){
    console.warn('Failed:',city.name,err.message);
    // ✅ Try cached data before showing error
    const cached=loadCache(city.id);
    if(cached){
      state.cityData[city.id]=cached;
      if(state.pinnedCities.includes(city.id))renderPinnedPills();
      if(state.selectedCity===city.id)renderMain();
      console.info('Using cached data for',city.name);
      return 'cached';
    }
    // No cache available — show helpful error only for selected city
    if(state.selectedCity===city.id){
      document.getElementById('mainPanel').innerHTML=
        '<div class="loading-state">'+
        '<div style="font-size:2.5rem">📶</div>'+
        '<div style="color:var(--text-primary);font-weight:600;font-size:1rem">No connection to weather API</div>'+
        '<div style="color:var(--text-muted);font-size:0.8rem;max-width:340px;text-align:center;line-height:1.7;margin-top:4px">'+
          'Your network is blocking the weather data.<br>'+
          '<strong style="color:var(--accent-yellow)">Try switching from WiFi to mobile data</strong>, then hit Refresh.'+
          '<br><br>Once loaded on data, the app caches weather so it shows even on blocked WiFi.'+
        '</div>'+
        '<button onclick="manualRefresh()" style="margin-top:0.75rem;background:rgba(50,120,255,0.2);border:1px solid var(--border-glow);color:var(--accent-blue);border-radius:8px;padding:0.5rem 1.5rem;font-size:0.85rem;font-family:inherit;cursor:pointer">↻ Try Again</button>'+
        '</div>';
    }
    return false;
  }
}

// Silently load a city in background (for dropdown temps etc)
function loadCityBackground(city){
  if(state.cityData[city.id])return; // already loaded
  loadOneCity(city);
}

async function loadSelectedCity(){
  const id=state.selectedCity;
  if(!id)return;
  if(state.cityData[id]){renderMain();return;}
  const city=CITIES.find(c=>c.id===id);
  if(city)await loadOneCity(city);
}

function finishLoading(){
  const now=new Date();
  document.getElementById('lastUpdate').textContent='Updated '+now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('refreshBtn').disabled=false;
  document.getElementById('refreshBtn').classList.remove('loading');
  document.getElementById('updateBadge').classList.remove('updating');
  nextRefreshAt=Date.now()+REFRESH_MS;
  clearInterval(countdownTimer);
  countdownTimer=setInterval(updateCountdown,1000);
  updateCountdown();
}

async function loadAllCities(){
  const badge=document.getElementById('updateBadge'),btn=document.getElementById('refreshBtn');
  badge.classList.add('updating');btn.disabled=true;btn.classList.add('loading');
  document.getElementById('lastUpdate').textContent='Updating…';
  // Load in small batches to avoid overwhelming the browser/API
  for(let i=0;i<CITIES.length;i+=4){
    await Promise.all(CITIES.slice(i,i+4).map(c=>loadOneCity(c)));
  }
  finishLoading();
}

async function manualRefresh(){
  clearInterval(state.refreshTimer);clearInterval(countdownTimer);
  // Reload selected city first for instant feedback
  const selCity=CITIES.find(c=>c.id===state.selectedCity);
  if(selCity){
    delete state.cityData[selCity.id];
    renderMain();
    await loadOneCity(selCity);
  }
  // Then rest in background
  for(let i=0;i<CITIES.length;i+=4){
    await Promise.all(CITIES.slice(i,i+4).map(c=>loadOneCity(c)));
  }
  finishLoading();
  state.refreshTimer=setInterval(loadAllCities,REFRESH_MS);
}

// Run a quick connectivity test before anything else
function init(){
  // ✅ STEP 0: Load ALL cached data instantly — works on WiFi or offline
  const allCache=loadAllCache();
  let cacheCount=0;
  for(const[cityId,entry]of Object.entries(allCache)){
    if(Date.now()-entry.ts<CACHE_MAX_AGE){
      state.cityData[cityId]={...entry.data,fromCache:true,cacheAge:Date.now()-entry.ts};
      cacheCount++;
    }
  }
  if(cacheCount>0)console.info('Loaded',cacheCount,'cities from cache');

  // SHOW UI IMMEDIATELY — cache fills in city data before first render
  state.selectedCity=state.pinnedCities.length>0?state.pinnedCities[0]:null;
  renderPinnedPills();
  renderMain(); // shows cached data instantly if available, or welcome screen

  // Then load data quietly in the background
  document.getElementById('updateBadge').classList.add('updating');
  document.getElementById('lastUpdate').textContent='Loading…';

  (async()=>{
    // Load selected city first for instant data
    if(state.selectedCity){
      await loadSelectedCity();
    }
    // Load pinned cities for header pills
    const pinned=CITIES.filter(c=>state.pinnedCities.includes(c.id)&&c.id!==state.selectedCity);
    if(pinned.length) await Promise.all(pinned.map(c=>loadOneCity(c)));
    renderPinnedPills();
    finishLoading();
    startAlertAutoRefresh();
    // Load all remaining cities silently in background
    setTimeout(()=>{
      const loaded=new Set(Object.keys(state.cityData));
      const remaining=CITIES.filter(c=>!loaded.has(c.id));
      (async()=>{
        for(let i=0;i<remaining.length;i+=4){
          await Promise.all(remaining.slice(i,i+4).map(c=>loadOneCity(c)));
          await new Promise(r=>setTimeout(r,200));
        }
      })();
    },300);
    state.refreshTimer=setInterval(loadAllCities,REFRESH_MS);
  })();
}
init();
</script>
