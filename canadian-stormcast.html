
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canadian StormCast ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
<style>
  :root {
    --bg-deep:#1a2a45; --bg-card:rgba(30,52,95,0.88); --border:rgba(90,155,255,0.22);
    --border-glow:rgba(90,200,255,0.5); --text-primary:#eef4ff; --text-secondary:#9bbedd;
    --text-muted:#6a9cbf; --accent-blue:#5cc8ff; --accent-yellow:#ffe066; --accent-red:#ff5f5f;
    --risk-none:#2ecc71; --radius:14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:15px;}
  body{font-family:'Inter',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden;
    background-image:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(40,90,200,0.3) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(25,70,150,0.25) 0%,transparent 70%);}
  .version-banner{background:#ffe066;color:#07111e;text-align:center;padding:7px 1rem;font-size:0.8rem;font-weight:700;letter-spacing:0.04em;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;}
  .header{position:sticky;top:0;z-index:100;background:rgba(20,34,62,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.25rem;height:64px;display:flex;align-items:center;gap:1rem;}
  .logo{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:var(--accent-blue);text-shadow:0 0 20px rgba(92,200,255,0.6);white-space:nowrap;letter-spacing:0.05em;flex-shrink:0;}
  .logo span{color:var(--accent-yellow);}
  .pin-pills{display:flex;align-items:center;gap:0.4rem;flex-shrink:0;}
  .pin-pill{display:flex;align-items:center;gap:0.35rem;background:rgba(35,60,110,0.7);border:1px solid rgba(255,224,102,0.35);border-radius:20px;padding:0.28rem 0.7rem 0.28rem 0.5rem;cursor:pointer;transition:all 0.18s;white-space:nowrap;font-size:0.72rem;}
  .pin-pill.active,.pin-pill:hover{border-color:var(--accent-yellow);background:rgba(255,224,102,0.12);}
  .pin-pill .pp-name{font-weight:600;color:var(--text-primary);}
  .pin-pill .pp-temp{font-family:'Roboto',sans-serif;font-weight:700;color:var(--accent-yellow);font-size:0.78rem;}
  .pin-pill .pp-sep{color:var(--text-muted);}
  .header-divider{width:1px;height:28px;background:var(--border);flex-shrink:0;}
  .cities-btn{display:flex;align-items:center;gap:0.4rem;background:rgba(35,60,110,0.65);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.75rem;font-size:0.75rem;font-family:'Inter',sans-serif;color:var(--text-secondary);cursor:pointer;white-space:nowrap;}
  .cities-btn:hover{border-color:var(--border-glow);color:var(--text-primary);}
  .cities-menu{position:absolute;top:calc(100%+6px);left:0;width:260px;background:rgba(18,32,60,0.99);border:1px solid var(--border);border-radius:10px;z-index:300;box-shadow:0 12px 40px rgba(0,0,0,0.6);display:none;max-height:420px;overflow-y:auto;}
  .cities-menu.open{display:block;}
  .cities-menu input{width:100%;background:rgba(35,60,110,0.7);border:1px solid var(--border);border-radius:6px;padding:0.35rem 0.6rem;color:var(--text-primary);font-size:0.8rem;font-family:'Inter',sans-serif;outline:none;}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:0.75rem;flex-shrink:0;}
  .update-badge{font-size:0.68rem;color:var(--text-muted);background:rgba(35,60,110,0.5);border:1px solid var(--border);padding:0.22rem 0.55rem;border-radius:20px;display:flex;align-items:center;gap:0.35rem;}
  .dot{display:inline-block;width:6px;height:6px;background:var(--risk-none);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .refresh-btn{background:rgba(35,60,110,0.65);border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;padding:0.28rem 0.6rem;font-size:0.72rem;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;gap:0.3rem;white-space:nowrap;}
  .refresh-btn:hover{border-color:var(--border-glow);color:var(--text-primary);}
  .refresh-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .main-panel{padding:1.25rem;max-width:1200px;margin:0 auto;}
  /* ── HERO + HOURLY row ── */
  .hero-hourly-row{display:grid;grid-template-columns:1.15fr 1fr;gap:1.25rem;margin-bottom:1.25rem;align-items:start;}
  @media(max-width:900px){.hero-hourly-row{grid-template-columns:1fr;}}
  .current-hero{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;position:relative;overflow:hidden;}
  .current-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(92,200,255,0.07) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
  .city-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:0.9rem;flex-wrap:wrap;}
  .city-title{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;}
  .city-province{font-size:0.85rem;color:var(--text-muted);margin-top:2px;}
  .city-time{font-size:0.72rem;color:var(--text-muted);text-align:right;white-space:nowrap;}
  .hero-pin-btn{display:inline-flex;align-items:center;background:rgba(255,224,102,0.1);border:1px solid rgba(255,224,102,0.3);border-radius:20px;padding:0.22rem 0.65rem;font-size:0.68rem;font-family:'Inter',sans-serif;font-weight:600;color:var(--accent-yellow);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .hero-pin-btn.pinned{background:rgba(255,224,102,0.18);border-color:var(--accent-yellow);}
  .conditions-grid{display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:1rem;align-items:center;}
  @media(max-width:700px){.conditions-grid{grid-template-columns:auto 1fr;}}
  .big-temp{font-family:'Roboto',sans-serif;font-size:3.2rem;font-weight:900;color:var(--text-primary);line-height:1;}
  .big-temp-unit{font-size:1.1rem;vertical-align:super;color:var(--text-muted);}
  .weather-icon-big .wi{font-size:2.8rem;color:#fff;filter:drop-shadow(0 0 10px rgba(255,255,255,0.4));}
  .condition-block{display:flex;flex-direction:column;gap:2px;}
  .condition-label{font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;}
  .condition-value{font-size:0.9rem;font-weight:600;color:var(--text-primary);}
  .weather-desc{font-size:0.95rem;color:var(--accent-blue);font-weight:500;margin:0.7rem 0 0;}
  /* ── HOURLY PANEL ── */
  .hourly-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;}
  .panel-title{font-size:0.62rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.75rem;}
  .hourly-scroll{display:flex;gap:0;overflow-x:auto;scrollbar-width:thin;}
  .hourly-scroll::-webkit-scrollbar{height:3px;}
  .hourly-scroll::-webkit-scrollbar-thumb{background:rgba(90,155,255,0.3);border-radius:2px;}
  .hourly-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0.4rem 0.7rem;flex-shrink:0;border-right:1px solid var(--border);}
  .hourly-item:last-child{border-right:none;}
  .hourly-time{font-size:0.63rem;color:var(--text-muted);font-weight:600;white-space:nowrap;}
  .hourly-icon .wi{font-size:1.15rem;color:#fff;filter:drop-shadow(0 0 3px rgba(255,255,255,0.3));}
  .hourly-temp{font-family:'Roboto',sans-serif;font-size:0.9rem;font-weight:700;color:var(--text-primary);}
  .hourly-precip{font-size:0.6rem;color:var(--accent-blue);}
  .hourly-wind{font-size:0.58rem;color:var(--text-muted);}
  /* ── CONDITIONS + ALERTS row ── */
  .conds-alerts-row{display:grid;grid-template-columns:1fr 310px;gap:1.25rem;margin-bottom:1.25rem;align-items:start;}
  @media(max-width:900px){.conds-alerts-row{grid-template-columns:1fr;}}
  .conditions-grid-2x2{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;}
  .cond-tile{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:0.85rem 0.75rem;display:flex;flex-direction:column;gap:4px;}
  .cond-tile-icon{font-size:1.3rem;}
  .cond-tile-label{font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;}
  .cond-tile-value{font-size:1rem;font-weight:700;color:var(--text-primary);}
  /* ── EC ALERTS PANEL ── */
  .ec-alerts-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;}
  .ec-alerts-title{font-size:0.63rem;font-weight:700;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.4rem;}
  .ec-alert-none{font-size:0.8rem;color:var(--text-muted);display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0;}
  .ec-loading{font-size:0.78rem;color:var(--text-muted);animation:pulse 1.5s infinite;}
  /* ── RISK PANELS ── */
  .risk-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
  @media(max-width:600px){.risk-row{grid-template-columns:1fr;}}
  .risk-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
  .risk-panel-title{font-size:0.62rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.9rem;}
  .risk-value{font-family:'Roboto',sans-serif;font-size:2.2rem;font-weight:900;line-height:1;}
  .risk-label{font-size:0.78rem;font-weight:700;margin-top:0.3rem;text-transform:uppercase;}
  .risk-bar-wrap{margin-top:0.75rem;height:8px;background:rgba(40,70,140,0.4);border-radius:4px;overflow:hidden;}
  .risk-bar{height:100%;border-radius:4px;}
  .risk-scale{display:flex;gap:4px;margin-top:0.6rem;flex-wrap:wrap;}
  .risk-scale-item{font-size:0.58rem;padding:2px 5px;border-radius:4px;font-weight:600;border:1px solid rgba(255,255,255,0.1);}
  /* ── FORECAST ── */
  .forecast-section{margin-bottom:1.25rem;}
  .section-title{font-size:0.62rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.75rem;}
  .forecast-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0.75rem;}
  @media(max-width:700px){.forecast-grid{grid-template-columns:repeat(3,1fr);}}
  .forecast-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:0.85rem 0.6rem;text-align:center;transition:all 0.2s;}
  .forecast-card:hover{border-color:var(--border-glow);transform:translateY(-2px);}
  .forecast-day{font-size:0.68rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;}
  .forecast-icon .wi{font-size:1.8rem;color:#fff;filter:drop-shadow(0 0 5px rgba(255,255,255,0.3));}
  .forecast-temps{font-size:0.88rem;font-weight:700;font-family:'Roboto',sans-serif;margin:4px 0;}
  .forecast-precip{font-size:0.65rem;color:var(--accent-blue);margin-bottom:4px;}
  .risk-chip{font-size:0.56rem;padding:1px 5px;border-radius:4px;font-weight:700;text-transform:uppercase;}
  /* ── LEGENDS ── */
  .legends-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
  .legend-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;}
  /* alert banner */
  .alert-banner{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.4);border-radius:10px;padding:0.75rem 1rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:0.75rem;font-size:0.85rem;}
  /* welcome */
  .welcome-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;gap:1rem;text-align:center;}
  .welcome-state h2{font-family:'Orbitron',sans-serif;font-size:1.2rem;color:var(--accent-blue);}
  .welcome-state p{font-size:0.85rem;color:var(--text-muted);max-width:360px;line-height:1.6;}
  .pin-manager{background:var(--bg-card);border:1px solid rgba(255,224,102,0.25);border-radius:var(--radius);padding:1.25rem 1.5rem;width:100%;max-width:420px;text-align:left;}
  .pin-manager-title{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:var(--accent-yellow);text-transform:uppercase;margin-bottom:0.85rem;}
  .pin-manager-row{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0.6rem;border-radius:8px;background:rgba(255,224,102,0.06);border:1px solid rgba(255,224,102,0.15);margin-bottom:0.45rem;cursor:pointer;}
  .pin-manager-row .pmr-left{font-size:0.85rem;font-weight:600;color:var(--text-primary);}
  .pin-manager-row .pmr-temp{font-family:'Roboto',sans-serif;font-size:0.8rem;color:var(--accent-blue);font-weight:700;}
  .pin-manager-row .pmr-remove{background:none;border:none;color:var(--text-muted);font-size:0.95rem;cursor:pointer;padding:2px 5px;border-radius:4px;}
  .pin-manager-hint{font-size:0.7rem;color:var(--text-muted);margin-top:0.75rem;line-height:1.5;}
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:1rem;}
  .spinner{width:48px;height:48px;border:3px solid rgba(92,200,255,0.2);border-top-color:var(--accent-blue);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* risk colours */
  .risk-color-none{color:#2ecc71}.risk-color-slight{color:#27ae60}.risk-color-low{color:#a3d977}.risk-color-marginal{color:#f1c40f}.risk-color-moderate{color:#f39c12}.risk-color-high{color:#e74c3c}.risk-color-extreme{color:#c0392b}.risk-color-very-high{color:#ff6b35}
  .bg-none{background:rgba(46,204,113,0.2);color:#2ecc71}.bg-slight{background:rgba(39,174,96,0.25);color:#2ecc71}.bg-low{background:rgba(163,217,119,0.2);color:#a3d977}.bg-marginal{background:rgba(241,196,15,0.2);color:#f1c40f}.bg-moderate{background:rgba(230,126,34,0.25);color:#e67e22}.bg-high{background:rgba(231,76,60,0.25);color:#e74c3c}.bg-extreme{background:rgba(192,57,43,0.3);color:#e74c3c}.bg-very-high{background:rgba(255,107,53,0.25);color:#ff6b35}
  ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:rgba(80,140,255,0.3);border-radius:3px;}
</style>
</head>

<div class="version-banner">
  ✅ Canadian StormCast v1.5.0 — EC Alerts live from api.weather.gc.ca · Auto-updates every 3 min
  <button onclick="this.parentElement.style.display='none'" style="background:rgba(0,0,0,0.15);border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:0.75rem;font-family:inherit">✕ dismiss</button>
</div>
<header class="header">
  <div class="logo">🍁 Canadian <span>Storm</span>Cast</div>
  <div class="pin-pills" id="pinPills">
    <span style="font-size:0.65rem;color:var(--text-muted);font-style:italic" id="noPinsHint">Pin cities to see them here</span>
  </div>
  <div class="header-divider"></div>
  <div style="position:relative">
    <button class="cities-btn" id="citiesBtn" onclick="toggleMenu()">🌍 All Cities (41) <span style="font-size:0.6rem">▼</span></button>
    <div class="cities-menu" id="citiesMenu">
      <div style="padding:0.5rem 0.65rem;border-bottom:1px solid var(--border)"><input id="menuSearch" type="text" placeholder="Search cities…" oninput="filterMenu(this.value)" autocomplete="off"></div>
      <div id="menuList"></div>
    </div>
  </div>
  <div style="font-size:0.6rem;color:var(--text-muted);flex-shrink:0">v1.5.0</div>
  <div class="header-right">
    <div class="update-badge"><span class="dot"></span><span id="lastUpdate">Loading…</span></div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()" disabled>↻ Refresh</button>
  </div>
</header>
<div class="main-panel" id="mainPanel">
  <div class="loading-state"><div class="spinner"></div><div style="color:var(--text-muted)">Fetching live weather…</div></div>
</div>

  const dew=Math.round(cur.temp-((100-cur.hum)/5));const vis=cur.wCode>=45&&cur.wCode<=48?'< 1 km':cur.wCode<=1?'> 20 km':'5-15 km';
  // Hourly strip
  const hourly=d.h12.map(h=>{const t=new Date(h.time+':00');const hr=t.getHours();const hw=wmo(h.wCode,hr>=6&&hr<21?1:0);return'<div class="hourly-item"><div class="hourly-time">'+t.toLocaleTimeString('en-CA',{timeZone:city.tz,hour:'numeric',hour12:true})+'</div><div class="hourly-icon">'+wi(hw.wi)+'</div><div class="hourly-temp">'+h.temp+'°</div><div class="hourly-precip">☔ '+h.pp+'%</div><div class="hourly-wind">'+h.wind+' km/h</div></div>';}).join('');
  // 5-day forecast
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fc=d.daily.time.slice(0,5).map((ds,i)=>{
    const dt=new Date(ds+'T12:00:00');const dl=i===0?'Today':days[dt.getDay()];
    const wc=d.daily.weather_code[i];const fw=wmo(wc,1);
    const hi=Math.round(d.daily.temperature_2m_max[i]);const lo=Math.round(d.daily.temperature_2m_min[i]);
    const pp=d.daily.precipitation_probability_max[i]||0;const pc=(d.daily.precipitation_sum[i]||0).toFixed(1);
    const g=Math.round(d.daily.wind_gusts_10m_max[i]||d.daily.wind_speed_10m_max[i]||0);
    const dtr=tor(d.dC[i]||0,d.dL[i]??2,g,city.region,dt.getMonth()+1);const dsr=thu(d.dC[i]||0,d.dL[i]??2,pp,wc,g,city.region,dt.getMonth()+1);
    const dtl=tLbl(dtr),dsl=sLbl(dsr);
    return'<div class="forecast-card"><div class="forecast-day">'+dl+'</div><div style="font-size:0.62rem;color:var(--text-muted);margin-bottom:4px">'+ds.slice(5).replace('-','/')+'</div><div class="forecast-icon" style="font-size:1.8rem;margin-bottom:4px;line-height:1">'+wi(fw.wi)+'</div><div class="forecast-temps"><span style="color:var(--text-primary)">'+hi+'°</span><span style="color:var(--text-muted)"> / </span><span style="color:var(--text-muted)">'+lo+'°</span></div><div class="forecast-precip">💧 '+pc+'mm · '+pp+'%</div><div style="display:flex;flex-direction:column;gap:3px"><div style="display:flex;align-items:center;justify-content:space-between;font-size:0.6rem"><span style="color:var(--text-muted)">🌪</span><span class="risk-chip bg-'+dtl.c+'">'+dtr+'% '+dtl.l+'</span></div><div style="display:flex;align-items:center;justify-content:space-between;font-size:0.6rem"><span style="color:var(--text-muted)">⛈</span><span class="risk-chip bg-'+dsl.c+'">'+dsr+'% '+dsl.l+'</span></div></div></div>';
  }).join('');
  // Risk panels
  function rp(type,risk,lbl){const it=type==='tornado';const ttl=it?'🌪️ Tornado Risk':'⛈️ Thunderstorm Risk';const mx=it?85:90;const pct=Math.min((risk/mx)*100,100);const col=rbc(lbl.c);const sc=it?[{r:'0-2%',l:'Slight',c:'slight'},{r:'3-10%',l:'Low',c:'low'},{r:'11-25%',l:'Marginal',c:'marginal'},{r:'26-49%',l:'Moderate',c:'moderate'},{r:'51-75%',l:'High',c:'high'},{r:'76-85%',l:'Extreme',c:'extreme'}]:[{r:'0-5%',l:'Slight',c:'slight'},{r:'6-15%',l:'Low',c:'low'},{r:'16-25%',l:'Marginal',c:'marginal'},{r:'26-49%',l:'Moderate',c:'moderate'},{r:'51-75%',l:'High',c:'high'},{r:'76-90%',l:'Very High',c:'very-high'}];return'<div class="risk-panel"><div class="risk-panel-title">'+ttl+'</div><div class="risk-value risk-color-'+lbl.c+'">'+risk+'%</div><div class="risk-label risk-color-'+lbl.c+'">'+lbl.l+' Risk</div><div class="risk-bar-wrap"><div class="risk-bar" style="width:'+pct+'%;background:'+col+'"></div></div><div class="risk-scale">'+sc.map(s=>'<span class="risk-scale-item bg-'+s.c+'" title="'+s.r+'">'+s.l+'</span>').join('')+'</div></div>';}
  function leg(type){const it=type==='tornado';const ttl=it?'🌪️ Tornado Risk Scale':'⛈️ Thunderstorm Risk Scale';const sc=it?[{l:'Slight',c:'slight',n:'Isolated, non-threatening'},{l:'Low',c:'low',n:'Possible in unstable areas'},{l:'Marginal',c:'marginal',n:'Elevated, monitor conditions'},{l:'Moderate',c:'moderate',n:'Significant threat, prepare'},{l:'High',c:'high',n:'Dangerous conditions likely'},{l:'Extreme',c:'extreme',n:'Life-threatening situation'}]:[{l:'Slight',c:'slight',n:'Isolated chance'},{l:'Low',c:'low',n:'Scattered storms possible'},{l:'Marginal',c:'marginal',n:'Storms likely in region'},{l:'Moderate',c:'moderate',n:'Widespread storm activity'},{l:'High',c:'high',n:'Severe storms expected'},{l:'Very High',c:'very-high',n:'Dangerous, widespread severe'}];return'<div class="legend-card"><div class="section-title">'+ttl+'</div><div style="display:flex;flex-direction:column;gap:5px">'+sc.map(s=>'<div style="display:flex;align-items:center;gap:8px;font-size:0.7rem"><strong class="risk-color-'+s.c+'" style="min-width:78px">'+s.l+'</strong><span style="color:var(--text-muted)">'+s.n+'</span></div>').join('')+'</div></div>';}
  // Fetch alerts async
  getAlerts(city).then(r=>{const el=document.getElementById('ecAlertsPanel');if(el)el.outerHTML=renderAlerts(r,city);startAlertCd();});
  panel.innerHTML=ab+
    // ROW 1: Hero | Hourly
    '<div class="hero-hourly-row">'+
      '<div class="current-hero">'+
        '<div class="city-title-row">'+
          '<div><div class="city-title">'+city.name+' <button class="hero-pin-btn'+(pin?' pinned':'')+'" onclick="pinDialog()">'+(pin?'✓ Pinned':'+ Pin')+'</button></div>'+
          '<div class="city-province">'+city.province+' · Canada</div></div>'+
          '<div class="city-time">📅 '+lt+'</div>'+
        '</div>'+
        '<div class="conditions-grid">'+
          '<div><div class="big-temp">'+cur.temp+'<span class="big-temp-unit">°C</span></div><div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">Feels like '+cur.feels+'°C</div></div>'+
          '<div style="font-size:3rem;text-align:center;line-height:1">'+wi(w.wi)+'</div>'+
          '<div class="condition-block"><div class="condition-label">💧 Humidity</div><div class="condition-value">'+cur.hum+'%</div><div class="condition-label" style="margin-top:8px">🌡️ Dew Pt</div><div class="condition-value">'+dew+'°C</div></div>'+
          '<div class="condition-block"><div class="condition-label">💨 Wind</div><div class="condition-value">'+cur.wind+' km/h '+wd(cur.windDir)+'</div><div class="condition-label" style="margin-top:8px">⚡ Gusts</div><div class="condition-value">'+cur.gust+' km/h</div></div>'+
        '</div>'+
        '<div class="weather-desc">'+w.desc+'</div>'+
      '</div>'+
      '<div class="hourly-panel"><div class="panel-title">🕐 12-Hour Forecast</div><div class="hourly-scroll">'+hourly+'</div></div>'+
    '</div>'+
    // ROW 2: Conditions | EC Alerts
    '<div class="conds-alerts-row">'+
      '<div class="conditions-grid-2x2">'+
        '<div class="cond-tile"><div class="cond-tile-icon">🌧️</div><div class="cond-tile-label">Precip</div><div class="cond-tile-value">'+cur.precip.toFixed(1)+' mm</div></div>'+
        '<div class="cond-tile"><div class="cond-tile-icon">⏱️</div><div class="cond-tile-label">Pressure</div><div class="cond-tile-value">'+cur.pressure+' hPa</div></div>'+
        '<div class="cond-tile"><div class="cond-tile-icon">👁️</div><div class="cond-tile-label">Visibility</div><div class="cond-tile-value">'+vis+'</div></div>'+
        '<div class="cond-tile"><div class="cond-tile-icon">☔</div><div class="cond-tile-label">Precip Prob.</div><div class="cond-tile-value">'+Math.round(cur.pp)+'%</div></div>'+
      '</div>'+
      '<div id="ecAlertsPanel"><div class="ec-alerts-panel"><div class="ec-alerts-title"><span style="animation:pulse 1.5s infinite;color:var(--text-muted)">●</span> EC Alerts — '+city.province+'</div><div class="ec-loading">Checking alerts…</div></div></div>'+
    '</div>'+
    // ROW 3: Risk
    '<div class="risk-row">'+rp('tornado',tr,tl)+rp('thunder',sr,sl)+'</div>'+
    // ROW 4: Forecast
    '<div class="forecast-section"><div class="section-title">📅 5-Day Forecast</div><div class="forecast-grid">'+fc+'</div></div>'+
    // ROW 5: Legends
    '<div class="legends-row">'+leg('tornado')+leg('thunder')+'</div>'+
    '<div style="text-align:center;font-size:0.62rem;color:var(--text-muted);padding-bottom:1rem">Weather: Open-Meteo API · Alerts: Environment Canada (api.weather.gc.ca) · Auto-updates every 15 min weather / 3 min alerts</div>';
}
// LOAD
const REFMS=15*60*1000;let nxtRef=null,cdT=null;
function uCd(){if(!nxtRef)return;const ms=nxtRef-Date.now();if(ms<=0){document.getElementById('lastUpdate').textContent='';return;}const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);document.getElementById('lastUpdate').textContent='Next: '+m+':'+String(s).padStart(2,'0');}
function fin(){const now=new Date();document.getElementById('lastUpdate').textContent='Updated '+now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('refreshBtn').disabled=false;nxtRef=Date.now()+REFMS;clearInterval(cdT);cdT=setInterval(uCd,1000);uCd();}
async function load(city){try{const data=await fetchCity(city);state.cityData[city.id]=data;if(state.pinnedCities.includes(city.id))renderPills();if(state.selectedCity===city.id)render();return true;}catch(e){if(state.selectedCity===city.id){document.getElementById('mainPanel').innerHTML='<div class="loading-state"><div style="font-size:2rem">⚠️</div><div style="color:#ff5f5f;font-weight:600">Could not load '+city.name+'</div><button onclick="manualRefresh()" style="margin-top:0.5rem;background:rgba(50,120,255,0.2);border:1px solid var(--border-glow);color:var(--accent-blue);border-radius:8px;padding:0.5rem 1.25rem;font-size:0.85rem;font-family:inherit;cursor:pointer">↻ Try Again</button></div>';}return false;}}
async function loadSel(){const id=state.selectedCity;if(!id||state.cityData[id]){render();return;}const city=CITIES.find(c=>c.id===id);if(city)await load(city);}
async function manualRefresh(){clearInterval(state.refreshTimer);clearInterval(cdT);const sc=CITIES.find(c=>c.id===state.selectedCity);if(sc){delete state.cityData[sc.id];render();await load(sc);}for(let i=0;i<CITIES.length;i+=4){await Promise.all(CITIES.slice(i,i+4).map(c=>load(c)));await new Promise(r=>setTimeout(r,100));}fin();state.refreshTimer=setInterval(async()=>{for(let i=0;i<CITIES.length;i+=4){await Promise.all(CITIES.slice(i,i+4).map(c=>load(c)));}fin();},REFMS);}
async function init(){
  state.selectedCity=state.pinnedCities.length>0?state.pinnedCities[0]:null;
  renderPills();render();
  await loadSel();
  await Promise.all(CITIES.filter(c=>state.pinnedCities.includes(c.id)&&c.id!==state.selectedCity).map(c=>load(c)));
  renderPills();fin();startAlerts();
  setTimeout(()=>{const ld=new Set(Object.keys(state.cityData));const rem=CITIES.filter(c=>!ld.has(c.id));(async()=>{for(let i=0;i<rem.length;i+=4){await Promise.all(rem.slice(i,i+4).map(c=>load(c)));await new Promise(r=>setTimeout(r,200));}})();},500);
  state.refreshTimer=setInterval(async()=>{for(let i=0;i<CITIES.length;i+=4){await Promise.all(CITIES.slice(i,i+4).map(c=>load(c)));}fin();},REFMS);
}
init();
</script>
