
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canadian StormCast ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
<style>
  :root {
    --bg-deep:#1a2a45;
    --bg-card:rgba(35,58,100,0.85);
    --bg-card2:rgba(40,65,110,0.8);
    --border:rgba(100,160,255,0.25);
    --border-glow:rgba(100,200,255,0.55);
    --text-primary:#eef4ff;
    --text-secondary:#9bbedd;
    --text-muted:#6a9cbf;
    --accent-blue:#5cc8ff;
    --accent-yellow:#ffe066;
    --accent-red:#ff5f5f;
    --risk-none:#2ecc71;
    --risk-slight:#27ae60;
    --risk-low:#a3d977;
    --risk-marginal:#f1c40f;
    --risk-moderate:#e67e22;
    --risk-high:#e74c3c;
    --risk-extreme:#c0392b;
    --radius:14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:15px;}
  body{font-family:'Inter',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden;
    background-image:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(50,100,200,0.3) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(30,80,160,0.25) 0%,transparent 70%);}
  .version-banner{background:#ffe066;color:#07111e;text-align:center;padding:6px;font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.05em;}
  .header{position:sticky;top:0;z-index:100;background:rgba(22,38,68,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.25rem;height:64px;display:flex;align-items:center;gap:1rem;}
  .logo{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:var(--accent-blue);text-shadow:0 0 20px rgba(92,200,255,0.6);white-space:nowrap;letter-spacing:0.05em;flex-shrink:0;}
  .logo span{color:var(--accent-yellow);}
  .pin-pills{display:flex;align-items:center;gap:0.4rem;flex-shrink:0;}
  .pin-pill{display:flex;align-items:center;gap:0.35rem;background:rgba(35,60,110,0.7);border:1px solid rgba(255,224,102,0.35);border-radius:20px;padding:0.28rem 0.7rem 0.28rem 0.5rem;cursor:pointer;transition:all 0.18s;white-space:nowrap;font-size:0.72rem;}
  .pin-pill:hover,.pin-pill.active{border-color:var(--accent-yellow);background:rgba(255,224,102,0.12);}
  .pin-pill .pp-name{font-weight:600;color:var(--text-primary);}
  .pin-pill .pp-temp{font-family:'Roboto',sans-serif;font-weight:700;color:var(--accent-yellow);font-size:0.78rem;}
  .pin-pill .pp-sep{color:var(--text-muted);}
  .no-pins-hint{font-size:0.65rem;color:var(--text-muted);font-style:italic;white-space:nowrap;}
  .header-divider{width:1px;height:28px;background:var(--border);flex-shrink:0;margin:0 0.1rem;}
  .cities-dropdown-wrap{position:relative;flex-shrink:0;}
  .cities-btn{display:flex;align-items:center;gap:0.4rem;background:rgba(35,60,110,0.65);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.75rem;font-size:0.75rem;font-family:'Inter',sans-serif;color:var(--text-secondary);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .cities-btn:hover,.cities-btn.open{border-color:var(--border-glow);color:var(--text-primary);}
  .cities-btn .caret{font-size:0.6rem;transition:transform 0.2s;}
  .cities-btn.open .caret{transform:rotate(180deg);}
  .cities-menu{position:absolute;top:calc(100%+6px);left:0;width:260px;background:rgba(22,40,78,0.99);border:1px solid var(--border);border-radius:10px;z-index:300;box-shadow:0 12px 40px rgba(0,0,0,0.5);overflow:hidden;display:none;max-height:420px;overflow-y:auto;}
  .cities-menu.open{display:block;}
  .cities-menu-search{padding:0.5rem 0.65rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(22,40,78,0.99);}
  .cities-menu-search input{width:100%;background:rgba(35,60,110,0.7);border:1px solid var(--border);border-radius:6px;padding:0.35rem 0.6rem;color:var(--text-primary);font-size:0.8rem;font-family:'Inter',sans-serif;outline:none;}
  .cities-menu-search input:focus{border-color:var(--accent-blue);}
  .cities-group-label{font-size:0.58rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;padding:0.55rem 0.75rem 0.2rem;background:rgba(22,40,78,0.99);}
  .city-menu-item{padding:0.5rem 0.75rem;cursor:pointer;font-size:0.82rem;transition:background 0.15s;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;}
  .city-menu-item:hover{background:rgba(80,140,255,0.15);}
  .city-menu-item.active{background:rgba(80,180,255,0.12);color:var(--accent-blue);}
  .city-menu-item.pinned-item{color:var(--accent-yellow);}
  .city-menu-item .cmi-temp{font-family:'Roboto',sans-serif;font-size:0.75rem;color:var(--accent-blue);font-weight:700;}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:0.75rem;flex-shrink:0;}
  .update-badge{font-size:0.68rem;color:var(--text-muted);background:rgba(35,60,110,0.5);border:1px solid var(--border);padding:0.22rem 0.55rem;border-radius:20px;white-space:nowrap;display:flex;align-items:center;gap:0.35rem;}
  .update-badge .dot{display:inline-block;width:6px;height:6px;background:var(--risk-none);border-radius:50%;flex-shrink:0;animation:pulse 2s infinite;}
  .update-badge.updating .dot{background:var(--accent-yellow);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .countdown-text{font-size:0.62rem;color:var(--text-muted);}
  .refresh-btn{background:rgba(35,60,110,0.65);border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;padding:0.28rem 0.6rem;font-size:0.72rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.3rem;white-space:nowrap;}
  .refresh-btn:hover{border-color:var(--border-glow);color:var(--text-primary);}
  .refresh-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .refresh-btn .spin{display:inline-block;}
  .refresh-btn.loading .spin{animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .welcome-state h2{font-family:'Orbitron',sans-serif;font-size:1.2rem;color:var(--accent-blue);}

  .pin-manager-row .pmr-temp{font-family:'Roboto',sans-serif;font-size:0.8rem;color:var(--accent-blue);font-weight:700;}
  .pin-manager-row .pmr-remove{background:none;border:none;color:var(--text-muted);font-size:0.95rem;cursor:pointer;padding:2px 5px;border-radius:4px;transition:all 0.15s;line-height:1;}
  .pin-manager-row .pmr-remove:hover{color:var(--accent-red);}
  .pin-manager-empty{font-size:0.8rem;color:var(--text-muted);font-style:italic;}
  .pin-manager-hint{font-size:0.7rem;color:var(--text-muted);margin-top:0.75rem;line-height:1.5;}
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:1rem;}
  .spinner{width:48px;height:48px;border:3px solid rgba(92,200,255,0.2);border-top-color:var(--accent-blue);border-radius:50%;animation:spin 0.8s linear infinite;}
  .current-hero{background:var(--bg-card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
  .current-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(92,200,255,0.1) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
  .city-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
  .city-title{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;color:var(--text-primary);}
  .city-province{font-size:0.875rem;color:var(--text-muted);margin-top:2px;}
  .city-time{font-size:0.75rem;color:var(--text-muted);text-align:right;}
  .conditions-grid{display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:1.25rem;align-items:center;}
  .big-temp{font-family:'Roboto',sans-serif;font-size:3.5rem;font-weight:900;color:var(--text-primary);line-height:1;}
  .big-temp-unit{font-size:1.2rem;vertical-align:super;color:var(--text-muted);}
  .weather-icon-big{font-size:3.5rem;text-align:center;line-height:1;}
  .weather-icon-big .wi{font-size:3.2rem;color:#fff;filter:drop-shadow(0 0 12px rgba(255,255,255,0.45));}
  .condition-block{display:flex;flex-direction:column;gap:2px;}
  .condition-label{font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;}
  .condition-value{font-size:0.95rem;font-weight:600;color:var(--text-primary);}
  .weather-desc{font-size:1rem;color:var(--accent-blue);font-weight:500;margin:0.75rem 0 0;}
  .risk-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
  .risk-panel{background:var(--bg-card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
  .risk-panel-title{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.9rem;}
  .risk-value{font-family:'Roboto',sans-serif;font-size:2.2rem;font-weight:900;line-height:1;}
  .risk-label{font-size:0.8rem;font-weight:700;margin-top:0.3rem;text-transform:uppercase;letter-spacing:0.05em;}
  .risk-bar-wrap{margin-top:0.75rem;height:8px;background:rgba(50,80,150,0.4);border-radius:4px;overflow:hidden;}
  .risk-bar{height:100%;border-radius:4px;transition:width 1s ease;}
  .risk-scale{display:flex;gap:4px;margin-top:0.6rem;flex-wrap:wrap;}
  .risk-scale-item{font-size:0.6rem;padding:2px 6px;border-radius:4px;font-weight:600;border:1px solid rgba(255,255,255,0.1);}
  .forecast-section{margin-bottom:1.25rem;}
  .section-title{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.75rem;}
  .forecast-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0.75rem;}
  .forecast-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:0.85rem 0.65rem;text-align:center;transition:all 0.2s;}
  .forecast-card:hover{border-color:var(--border-glow);transform:translateY(-2px);}
  .forecast-day{font-size:0.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem;}
  .forecast-icon .wi{font-size:1.9rem;color:#fff;filter:drop-shadow(0 0 6px rgba(255,255,255,0.3));}
  .forecast-temps{font-size:0.9rem;font-weight:700;font-family:'Roboto',sans-serif;margin-bottom:0.6rem;}
  .forecast-hi{color:var(--text-primary);}
  .forecast-lo{color:var(--text-muted);}
  .forecast-precip{font-size:0.68rem;color:var(--accent-blue);margin-bottom:0.5rem;}
  .forecast-risks{display:flex;flex-direction:column;gap:3px;}
  .forecast-risk-row{display:flex;align-items:center;justify-content:space-between;font-size:0.6rem;}
  .forecast-risk-row .label{color:var(--text-muted);}
  .risk-chip{font-size:0.58rem;padding:1px 5px;border-radius:4px;font-weight:700;text-transform:uppercase;}
  .conditions-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:0.75rem;margin-bottom:1.25rem;}
  .cond-tile{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:0.85rem 0.75rem;display:flex;flex-direction:column;gap:4px;}
  .cond-tile-icon{font-size:1.3rem;}
  .cond-tile-label{font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;}
  .cond-tile-value{font-size:1rem;font-weight:700;color:var(--text-primary);}
  .alert-banner{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.4);border-radius:10px;padding:0.75rem 1rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:0.75rem;font-size:0.85rem;}
  .risk-color-none{color:#2ecc71}.risk-color-slight{color:#27ae60}.risk-color-low{color:#a3d977}.risk-color-marginal{color:#f1c40f}.risk-color-moderate{color:#f39c12}.risk-color-high{color:#e74c3c}.risk-color-extreme{color:#c0392b}.risk-color-very-high{color:#ff6b35}
  .bg-none{background:rgba(46,204,113,0.2);color:#2ecc71}.bg-slight{background:rgba(39,174,96,0.25);color:#2ecc71}.bg-low{background:rgba(163,217,119,0.2);color:#a3d977}.bg-marginal{background:rgba(241,196,15,0.2);color:#f1c40f}.bg-moderate{background:rgba(230,126,34,0.25);color:#e67e22}.bg-high{background:rgba(231,76,60,0.25);color:#e74c3c}.bg-extreme{background:rgba(192,57,43,0.3);color:#e74c3c}.bg-very-high{background:rgba(255,107,53,0.25);color:#ff6b35}
  ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(80,140,255,0.3);border-radius:3px;}
</style>
</head>
<body>
<div class="version-banner">✅ YOU HAVE THE CORRECT FILE — Canadian StormCast v1.4.5 <button onclick="this.parentElement.style.display='none'" style="margin-left:1rem;background:rgba(0,0,0,0.15);border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:0.75rem">✕ dismiss</button></div>
<header class="header">
  <div class="logo">🍁 Canadian <span>Storm</span>Cast</div>

  <div class="cities-dropdown-wrap">

</header>
<div class="main-panel" id="mainPanel">

<script>

const CITIES=[

const RS={prairies:1.0,ontario:0.85,quebec:0.75,maritimes:0.6,west_coast:0.35,interior_bc:0.5};
function sf(m){return[0.08,0.08,0.15,0.35,0.65,1.0,1.0,0.85,0.5,0.25,0.1,0.08][Math.max(0,Math.min(11,m-1))];}
function tornadoRisk(cape,li,gust,region,month){cape=cape||0;li=(li==null)?2:li;let b=0;if(cape>2500&&li<-6)b=55;else if(cape>2000&&li<-5)b=38;else if(cape>1500&&li<-4)b=24;else if(cape>1000&&li<-3)b=15;else if(cape>700&&li<-2)b=9;else if(cape>400&&li<-1)b=5;else if(cape>200&&li<0)b=2.5;else if(cape>50)b=0.8;if(gust>80)b*=1.3;else if(gust>60)b*=1.15;return Math.max(0,Math.min(Math.round(b*sf(month)*(RT[region]||0.3)),85));}
function thunderRisk(cape,li,pp,wc,gust,region,month){cape=cape||0;li=(li==null)?2:li;pp=pp||0;let b=0;if([95,96,99].includes(wc))b=Math.max(b,55+Math.min(pp*0.25,25));if(cape>2000&&li<-5)b=Math.max(b,60);else if(cape>1500&&li<-4)b=Math.max(b,48);else if(cape>1000&&li<-3)b=Math.max(b,36);else if(cape>700&&li<-2)b=Math.max(b,26);else if(cape>400&&li<-1)b=Math.max(b,18);else if(cape>200&&li<0)b=Math.max(b,10);else if(cape>50)b=Math.max(b,4);b+=pp*0.18;if(gust>80)b*=1.2;return Math.max(0,Math.min(Math.round(b*sf(month)*(RS[region]||0.6)),90));}
function tLbl(p){if(p===0)return{label:'None',cls:'none'};if(p<=2)return{label:'Slight',cls:'slight'};if(p<=10)return{label:'Low',cls:'low'};if(p<=25)return{label:'Marginal',cls:'marginal'};if(p<=49)return{label:'Moderate',cls:'moderate'};if(p<=75)return{label:'High',cls:'high'};return{label:'Extreme',cls:'extreme'};}
function sLbl(p){if(p===0)return{label:'None',cls:'none'};if(p<=5)return{label:'Slight',cls:'slight'};if(p<=15)return{label:'Low',cls:'low'};if(p<=25)return{label:'Marginal',cls:'marginal'};if(p<=49)return{label:'Moderate',cls:'moderate'};if(p<=75)return{label:'High',cls:'high'};return{label:'Very High',cls:'very-high'};}
function rbc(cls){return{none:'#2ecc71',slight:'#27ae60',low:'#a3d977',marginal:'#f1c40f',moderate:'#e67e22',high:'#e74c3c',extreme:'#c0392b','very-high':'#ff6b35'}[cls]||'#5cc8ff';}
function windDir(deg){if(deg==null)return'N/A';return['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg/22.5)%16];}
function wmoInfo(code,isDay=1){const d=isDay?'day':'night';const map={0:{desc:'Clear Sky',wiClass:d==='day'?'wi-day-sunny':'wi-night-clear'},1:{desc:'Mainly Clear',wiClass:d==='day'?'wi-day-sunny-overcast':'wi-night-alt-partly-cloudy'},2:{desc:'Partly Cloudy',wiClass:d==='day'?'wi-day-cloudy':'wi-night-alt-cloudy'},3:{desc:'Overcast',wiClass:'wi-cloud'},45:{desc:'Foggy',wiClass:'wi-fog'},48:{desc:'Icy Fog',wiClass:'wi-fog'},51:{desc:'Light Drizzle',wiClass:'wi-sprinkle'},53:{desc:'Drizzle',wiClass:'wi-showers'},55:{desc:'Heavy Drizzle',wiClass:'wi-rain'},61:{desc:'Light Rain',wiClass:d==='day'?'wi-day-rain':'wi-night-alt-rain'},63:{desc:'Moderate Rain',wiClass:'wi-rain'},65:{desc:'Heavy Rain',wiClass:'wi-rain'},66:{desc:'Freezing Rain',wiClass:'wi-rain-mix'},71:{desc:'Light Snow',wiClass:d==='day'?'wi-day-snow':'wi-night-alt-snow'},73:{desc:'Moderate Snow',wiClass:'wi-snow'},75:{desc:'Heavy Snow',wiClass:'wi-snow-wind'},80:{desc:'Light Showers',wiClass:d==='day'?'wi-day-showers':'wi-night-alt-showers'},81:{desc:'Moderate Showers',wiClass:'wi-showers'},95:{desc:'Thunderstorm',wiClass:d==='day'?'wi-day-thunderstorm':'wi-night-alt-thunderstorm'},96:{desc:'Thunderstorm w/ Hail',wiClass:'wi-thunderstorm'},99:{desc:'Severe Thunderstorm',wiClass:'wi-thunderstorm'}};return map[code]||{desc:'Unknown',wiClass:'wi-na'};}
function wiIcon(c){return'<i class="wi '+c+'"></i>';}
async function fetchCityWeather(city){
  const url='https://api.open-meteo.com/v1/forecast?latitude='+city.lat+'&longitude='+city.lon+'&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,surface_pressure,is_day&hourly=cape,lifted_index,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max&timezone='+encodeURIComponent(city.tz)+'&forecast_days=5&wind_speed_unit=kmh&temperature_unit=celsius&precipitation_unit=mm';
  const res=await Promise.race([fetch(url),new Promise((_,r)=>setTimeout(()=>r(new Error('Timeout')),8000))]);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const data=await res.json();
  const now=new Date(data.current.time);
  const hi=Math.max(0,data.hourly.time.findIndex(t=>new Date(t)>=now));
  const dailyCape=[],dailyLi=[];
  for(let d=0;d<5;d++){const s=d*24,e=s+24;const ca=data.hourly.cape.slice(s,e).filter(v=>v!==null);const li=data.hourly.lifted_index.slice(s,e).filter(v=>v!==null);dailyCape.push(ca.length?Math.max(...ca):0);dailyLi.push(li.length?Math.min(...li):2);}
  const cur=data.current,gust=cur.wind_gusts_10m||cur.wind_speed_10m;
  return{city,month:now.getMonth()+1,current:{temp:Math.round(cur.temperature_2m),feels:Math.round(cur.apparent_temperature),humidity:cur.relative_humidity_2m,wCode:cur.weather_code,wind:Math.round(cur.wind_speed_10m),windDir:cur.wind_direction_10m,windGust:Math.round(gust),precip:cur.precipitation,pressure:Math.round(cur.surface_pressure),isDay:cur.is_day,time:cur.time,cape:Math.round(data.hourly.cape[hi]??0),li:data.hourly.lifted_index[hi]!=null?Math.round((data.hourly.lifted_index[hi]??2)*10)/10:null,precipProb:data.hourly.precipitation_probability[hi]??0},daily:data.daily,dailyCape,dailyLi};
}
let menuOpen=false;
function toggleCitiesMenu(){menuOpen=!menuOpen;document.getElementById('citiesMenu').classList.toggle('open',menuOpen);document.getElementById('citiesBtn').classList.toggle('open',menuOpen);if(menuOpen){buildMenuList('');document.getElementById('menuSearch').value='';setTimeout(()=>document.getElementById('menuSearch').focus(),50);}}
function closeCitiesMenu(){menuOpen=false;document.getElementById('citiesMenu').classList.remove('open');document.getElementById('citiesBtn').classList.remove('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.cities-dropdown-wrap'))closeCitiesMenu();});
function filterMenu(q){buildMenuList(q);}
function buildMenuList(q){
  const list=document.getElementById('menuList');const lq=q.toLowerCase();
  const filtered=CITIES.filter(c=>!lq||c.name.toLowerCase().includes(lq)||c.province.toLowerCase().includes(lq));
  const groups={};PROVINCE_ORDER.forEach(p=>{groups[p]=[];});
  filtered.forEach(c=>{if(groups[c.province])groups[c.province].push(c);});
  let html='';
  for(const prov of PROVINCE_ORDER){const cities=groups[prov];if(!cities||!cities.length)continue;html+='<div class="cities-group-label">'+prov+'</div>';cities.forEach(city=>{const d=state.cityData[city.id];const isPinned=state.pinnedCities.includes(city.id);const isActive=state.selectedCity===city.id;const tempHtml=d?'<span class="cmi-temp">'+d.current.temp+'°</span>':'';const pinHtml=isPinned?'<span style="font-size:0.7rem">📌</span>':'';html+='<div class="city-menu-item'+(isActive?' active':'')+(isPinned?' pinned-item':'')+'" onclick="selectCity(\''+city.id+'\');closeCitiesMenu()"><span>'+city.name+'</span><span style="display:flex;align-items:center;gap:4px">'+tempHtml+pinHtml+'</span></div>';});}
  if(!html)html='<div style="padding:1rem;color:var(--text-muted);font-size:0.8rem;text-align:center">No cities found</div>';
  list.innerHTML=html;
}
function renderPinnedPills(){
  const wrap=document.getElementById('pinPills');const hint=document.getElementById('noPinsHint');
  wrap.querySelectorAll('.pin-pill').forEach(el=>el.remove());
  if(state.pinnedCities.length===0){hint.style.display='';return;}
  hint.style.display='none';
  state.pinnedCities.forEach(id=>{const city=CITIES.find(c=>c.id===id);if(!city)return;const d=state.cityData[id];const isActive=state.selectedCity===id;const pill=document.createElement('div');pill.className='pin-pill'+(isActive?' active':'');let iconHtml='<span>🍁</span>';let tempHtml='<span class="pp-sep">·</span><span class="pp-temp">--°</span>';if(d){const w=wmoInfo(d.current.wCode,d.current.isDay);iconHtml='<span class="pp-icon">'+wiIcon(w.wiClass)+'</span>';tempHtml='<span class="pp-sep">·</span><span class="pp-temp">'+d.current.temp+'°</span>';}pill.innerHTML=iconHtml+'<span class="pp-name">'+city.name+'</span>'+tempHtml;pill.onclick=()=>selectCity(id);wrap.appendChild(pill);});
}
function selectCity(id){state.selectedCity=id;renderPinnedPills();renderMain();}
function buildPinManager(){
  let rows='';
  if(state.pinnedCities.length===0){rows='<div class="pin-manager-empty">No cities pinned yet.</div>';}
  else{state.pinnedCities.forEach((id,i)=>{const city=CITIES.find(c=>c.id===id);if(!city)return;const d=state.cityData[id];const tempHtml=d?'<span class="pmr-temp">'+d.current.temp+'°C</span>':'';const label=i===0?' <span style="font-size:0.65rem;color:var(--accent-yellow);margin-left:4px">(opens first)</span>':'';rows+='<div class="pin-manager-row" onclick="selectCity(\''+id+'\')"><span class="pmr-left">📌 '+city.name+label+'</span><span style="display:flex;align-items:center;gap:8px">'+tempHtml+'<button class="pmr-remove" onclick="event.stopPropagation();removePinFromManager(\''+id+'\')">✕</button></span></div>';});}
  return'<div class="pin-manager"><div class="pin-manager-title">📌 Your Pinned Cities</div>'+rows+'<div class="pin-manager-hint">The <strong>first pinned city</strong> always opens on load &amp; refresh.<br>Remove with ✕ then re-pin via <em>All Cities ▼</em>.</div></div>';
}
function removePinFromManager(id){const idx=state.pinnedCities.indexOf(id);if(idx>=0)state.pinnedCities.splice(idx,1);savePins();renderPinnedPills();renderMain();}
function openPinDialog(){const id=state.selectedCity;if(!id)return;const idx=state.pinnedCities.indexOf(id);if(idx>=0){state.pinnedCities.splice(idx,1);savePins();renderPinnedPills();renderMain();}else{if(state.pinnedCities.length>=MAX_PINS){alert('You can only pin up to 3 cities. Remove a pin first.');return;}state.pinnedCities.push(id);savePins();renderPinnedPills();renderMain();}}
function renderMain(){
  const panel=document.getElementById('mainPanel');const cityId=state.selectedCity;
  if(!cityId){panel.innerHTML='<div class="welcome-state"><div class="big-leaf">🍁</div><h2>Canadian StormCast</h2><p>Select a city from <strong>All Cities ▼</strong> above, or pin up to 3 favourites.</p>'+buildPinManager()+'</div>';return;}
  const d=state.cityData[cityId];
  if(!d){panel.innerHTML='<div class="loading-state"><div class="spinner"></div><div style="color:var(--text-primary);font-size:1rem;font-weight:600">Loading weather…</div></div>';return;}
  const city=d.city,cur=d.current,w=wmoInfo(cur.wCode,cur.isDay),month=d.month;
  const tr=tornadoRisk(cur.cape,cur.li,cur.windGust,city.region,month);const sr=thunderRisk(cur.cape,cur.li,cur.precipProb,cur.wCode,cur.windGust,city.region,month);
  const tl=tLbl(tr),sl=sLbl(sr);const isPinned=state.pinnedCities.includes(cityId);
  const alertHTML=(tr>=26||sr>=51)?'<div class="alert-banner"><span>⚠️</span><span>'+(tr>=26?'<strong>Tornado Risk:</strong> '+tl.label+' ('+tr+'%) in '+city.name+'. ':'' )+(sr>=51?'<strong>Thunderstorm:</strong> '+sl.label+' ('+sr+'%). ':'')+'Stay weather-aware.</span></div>':'';
  const localTime=new Date(cur.time+':00').toLocaleString('en-CA',{timeZone:city.tz,weekday:'long',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  const dew=Math.round(cur.temp-((100-cur.humidity)/5));const vis=cur.wCode>=45&&cur.wCode<=48?'< 1 km':cur.wCode<=1?'> 20 km':'5-15 km';
  const daily=d.daily;const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const forecastHtml=daily.time.slice(0,5).map((dateStr,i)=>{const date=new Date(dateStr+'T12:00:00');const dayLabel=i===0?'Today':days[date.getDay()];const wc=daily.weather_code[i];const fw=wmoInfo(wc,1);const hi=Math.round(daily.temperature_2m_max[i]);const lo=Math.round(daily.temperature_2m_min[i]);const precip=(daily.precipitation_sum[i]||0).toFixed(1);const pp=daily.precipitation_probability_max[i]||0;const gust=Math.round(daily.wind_gusts_10m_max[i]||daily.wind_speed_10m_max[i]||0);const ftr=tornadoRisk(d.dailyCape[i]||0,d.dailyLi[i]??2,gust,city.region,date.getMonth()+1);const fsr=thunderRisk(d.dailyCape[i]||0,d.dailyLi[i]??2,pp,wc,gust,city.region,date.getMonth()+1);const ftl=tLbl(ftr),fsl=sLbl(fsr);return'<div class="forecast-card"><div class="forecast-day">'+dayLabel+'</div><div style="font-size:0.65rem;color:var(--text-muted);margin-bottom:4px">'+dateStr.slice(5).replace('-','/')+'</div><div class="forecast-icon" style="font-size:2rem;margin-bottom:0.4rem;line-height:1">'+wiIcon(fw.wiClass)+'</div><div class="forecast-temps"><span class="forecast-hi">'+hi+'°</span><span style="color:var(--text-muted)"> / </span><span class="forecast-lo">'+lo+'°</span></div><div class="forecast-precip">💧 '+precip+'mm · '+pp+'%</div><div class="forecast-risks"><div class="forecast-risk-row"><span class="label">🌪</span><span class="risk-chip bg-'+ftl.cls+'">'+ftr+'% '+ftl.label+'</span></div><div class="forecast-risk-row"><span class="label">⛈</span><span class="risk-chip bg-'+fsl.cls+'">'+fsr+'% '+fsl.label+'</span></div></div></div>';}).join('');
  panel.innerHTML=alertHTML+'<div class="current-hero"><div class="city-title-row"><div><div class="city-title">'+city.name+(isPinned?' 📌':'')+'</div><div class="city-province">'+city.province+' · Canada</div></div><div class="city-time">📅 '+localTime+'</div></div><div class="conditions-grid"><div><div class="big-temp">'+cur.temp+'<span class="big-temp-unit">°C</span></div><div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">Feels like '+cur.feels+'°C</div></div><div class="weather-icon-big">'+wiIcon(w.wiClass)+'</div><div class="condition-block"><div class="condition-label">💧 Humidity</div><div class="condition-value">'+cur.humidity+'%</div><div class="condition-label" style="margin-top:8px">🌡️ Dew Point</div><div class="condition-value">'+dew+'°C</div></div><div class="condition-block"><div class="condition-label">💨 Wind</div><div class="condition-value">'+cur.wind+' km/h '+windDir(cur.windDir)+'</div><div class="condition-label" style="margin-top:8px">⚡ Gusts</div><div class="condition-value">'+cur.windGust+' km/h</div></div></div><div class="weather-desc">'+w.desc+'</div></div><div class="conditions-strip"><div class="cond-tile"><div class="cond-tile-icon">🌧️</div><div class="cond-tile-label">Precip</div><div class="cond-tile-value">'+cur.precip.toFixed(1)+' mm</div></div><div class="cond-tile"><div class="cond-tile-icon">⏱️</div><div class="cond-tile-label">Pressure</div><div class="cond-tile-value">'+cur.pressure+' hPa</div></div><div class="cond-tile"><div class="cond-tile-icon">👁️</div><div class="cond-tile-label">Visibility</div><div class="cond-tile-value">'+vis+'</div></div><div class="cond-tile"><div class="cond-tile-icon">☔</div><div class="cond-tile-label">Precip Prob.</div><div class="cond-tile-value">'+Math.round(cur.precipProb)+'%</div></div></div><div class="risk-row">'+buildRP('tornado',tr,tl)+buildRP('thunder',sr,sl)+'</div><div class="forecast-section"><div class="section-title">📅 5-Day Forecast</div><div class="forecast-grid">'+forecastHtml+'</div></div><div style="text-align:center;font-size:0.65rem;color:var(--text-muted);padding:0.5rem 0 1rem"><button onclick="openPinDialog()" style="background:none;border:none;color:var(--accent-yellow);cursor:pointer;font-size:0.65rem;font-family:inherit">📌 '+(isPinned?'Unpin this city':'Pin this city')+'</button></div>';
}
function buildRP(type,risk,lbl){const isTornado=type==='tornado';const title=isTornado?'🌪️ Tornado Risk':'⛈️ Thunderstorm Risk';const maxR=isTornado?85:90;const pct=Math.min((risk/maxR)*100,100);const color=rbc(lbl.cls);const items=isTornado?[{r:'0-2%',l:'Slight',c:'slight'},{r:'3-10%',l:'Low',c:'low'},{r:'11-25%',l:'Marginal',c:'marginal'},{r:'26-49%',l:'Moderate',c:'moderate'},{r:'51-75%',l:'High',c:'high'},{r:'76-85%',l:'Extreme',c:'extreme'}]:[{r:'0-5%',l:'Slight',c:'slight'},{r:'6-15%',l:'Low',c:'low'},{r:'16-25%',l:'Marginal',c:'marginal'},{r:'26-49%',l:'Moderate',c:'moderate'},{r:'51-75%',l:'High',c:'high'},{r:'76-90%',l:'Very High',c:'very-high'}];return'<div class="risk-panel"><div class="risk-panel-title">'+title+'</div><div class="risk-value risk-color-'+lbl.cls+'">'+risk+'%</div><div class="risk-label risk-color-'+lbl.cls+'">'+lbl.label+' Risk</div><div class="risk-bar-wrap"><div class="risk-bar" style="width:'+pct+'%;background:'+color+'"></div></div><div class="risk-scale">'+items.map(s=>'<span class="risk-scale-item bg-'+s.c+'" title="'+s.r+'">'+s.l+'</span>').join('')+'</div></div>';}
const REFRESH_MS=15*60*1000;let nextRefreshAt=null,countdownTimer=null;
function updateCountdown(){if(!nextRefreshAt)return;const ms=nextRefreshAt-Date.now();if(ms<=0){document.getElementById('countdownText').textContent='';return;}const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);document.getElementById('countdownText').textContent='Next: '+m+':'+String(s).padStart(2,'0');}
function finishLoading(){const now=new Date();document.getElementById('lastUpdate').textContent='Updated '+now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('refreshBtn').disabled=false;document.getElementById('refreshBtn').classList.remove('loading');document.getElementById('updateBadge').classList.remove('updating');nextRefreshAt=Date.now()+REFRESH_MS;clearInterval(countdownTimer);countdownTimer=setInterval(updateCountdown,1000);updateCountdown();}
async function loadOneCity(city){try{const data=await fetchCityWeather(city);state.cityData[city.id]=data;if(state.pinnedCities.includes(city.id))renderPinnedPills();if(state.selectedCity===city.id)renderMain();return true;}catch(err){console.warn('Failed:',city.name,err.message);if(state.selectedCity===city.id){document.getElementById('mainPanel').innerHTML='<div class="loading-state"><div style="font-size:2rem">⚠️</div><div style="color:var(--accent-red);font-weight:600">Could not load '+city.name+'</div><div style="color:var(--text-muted);font-size:0.8rem">Check your internet and try again.</div><button onclick="manualRefresh()" style="margin-top:0.5rem;background:rgba(50,120,255,0.2);border:1px solid var(--border-glow);color:var(--accent-blue);border-radius:8px;padding:0.5rem 1.25rem;font-size:0.85rem;font-family:inherit;cursor:pointer">↻ Try Again</button></div>';}return false;}}
async function loadSelectedCity(){const id=state.selectedCity;if(!id)return;if(state.cityData[id]){renderMain();return;}const city=CITIES.find(c=>c.id===id);if(city)await loadOneCity(city);}
async function loadAllCities(){const badge=document.getElementById('updateBadge'),btn=document.getElementById('refreshBtn');badge.classList.add('updating');btn.disabled=true;btn.classList.add('loading');document.getElementById('lastUpdate').textContent='Updating…';for(let i=0;i<CITIES.length;i+=4){await Promise.all(CITIES.slice(i,i+4).map(c=>loadOneCity(c)));await new Promise(r=>setTimeout(r,100));}finishLoading();}
async function manualRefresh(){clearInterval(state.refreshTimer);clearInterval(countdownTimer);const selCity=CITIES.find(c=>c.id===state.selectedCity);if(selCity){delete state.cityData[selCity.id];renderMain();await loadOneCity(selCity);}for(let i=0;i<CITIES.length;i+=4){await Promise.all(CITIES.slice(i,i+4).map(c=>loadOneCity(c)));await new Promise(r=>setTimeout(r,100));}finishLoading();state.refreshTimer=setInterval(loadAllCities,REFRESH_MS);}
async function init(){
  state.selectedCity=state.pinnedCities.length>0?state.pinnedCities[0]:null;
  renderPinnedPills();renderMain();
  await loadSelectedCity();
  const pinned=CITIES.filter(c=>state.pinnedCities.includes(c.id)&&c.id!==state.selectedCity);
  await Promise.all(pinned.map(c=>loadOneCity(c)));
  renderPinnedPills();finishLoading();
  setTimeout(()=>{const loaded=new Set(Object.keys(state.cityData));const remaining=CITIES.filter(c=>!loaded.has(c.id));(async()=>{for(let i=0;i<remaining.length;i+=4){await Promise.all(remaining.slice(i,i+4).map(c=>loadOneCity(c)));await new Promise(r=>setTimeout(r,200));}})();},500);
  state.refreshTimer=setInterval(loadAllCities,REFRESH_MS);
}
init();
</script>
